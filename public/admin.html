<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1a1a24; --border:#2a2a35;
  --accent:#D4943A; --accent-glow:rgba(212,148,58,0.15); --accent-dim:#7A4A28;
  --green:#4ade80; --red:#f87171; --blue:#60a5fa; --purple:#c084fc; --yellow:#fbbf24;
  --text:#e8e8ef; --muted:#888899;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans','Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;}
input,textarea,select,button{font-family:inherit;font-size:inherit;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:var(--safe-top);}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:52px;flex-shrink:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;margin-right:auto;}
.logo-icon{font-size:18px;}
.logo-name{font-family:'DM Serif Display',Georgia,serif;font-size:16px;font-weight:700;color:var(--accent);}
.logo-sub{color:var(--muted);font-size:10px;font-weight:500;display:none;}
@media(min-width:500px){.logo-sub{display:inline;}}
.header-logout{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--muted);font-size:10px;cursor:pointer;}
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:9px;font-weight:500;transition:color 0.2s;}
.nav-btn.active{color:var(--accent);}
.nav-btn .nav-icon{font-size:18px;line-height:1;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.pad{padding:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.card-accent{border-top:3px solid var(--accent);}
.section-title{font-family:'DM Serif Display',Georgia,serif;font-size:20px;margin:0 0 4px;}
.section-sub{color:var(--muted);font-size:12px;margin:0 0 16px;}
.label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
.badge-green{background:rgba(74,222,128,0.15);color:var(--green);}
.badge-yellow{background:rgba(251,191,36,0.15);color:var(--yellow);}
.badge-red{background:rgba(248,113,113,0.15);color:var(--red);}
.badge-blue{background:rgba(96,165,250,0.15);color:var(--blue);}
.badge-purple{background:rgba(192,132,252,0.15);color:var(--purple);}
.badge-accent{background:var(--accent-glow);color:var(--accent);}
.btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer;transition:opacity 0.2s;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;}
.btn-outline.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);outline:none;font-size:14px;}
.input:focus{border-color:var(--accent);}
select.input{appearance:auto;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.stat-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;}
.stat-value{font-family:'DM Serif Display',Georgia,serif;font-size:24px;font-weight:700;color:var(--text);margin:2px 0;}
.stat-sub{color:var(--muted);font-size:11px;}
.student-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s;}
.student-card:hover{border-color:var(--accent);}
.student-name{font-family:'DM Serif Display',Georgia,serif;font-size:17px;margin-bottom:2px;}
.student-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:11px;}
.student-detail{display:flex;align-items:center;gap:4px;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.attendance-grid{display:grid;grid-template-columns:120px repeat(7,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;font-size:12px;}
.attendance-cell{background:var(--surface);padding:8px 6px;text-align:center;display:flex;align-items:center;justify-content:center;}
.attendance-header{background:var(--surface2);font-weight:600;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.3px;}
.attendance-name{justify-content:flex-start;font-weight:600;font-size:12px;}
.attendance-toggle{cursor:pointer;font-size:16px;transition:opacity 0.2s;}
.attendance-toggle:hover{opacity:0.8;}
.payment-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);}
.payment-row:last-child{border-bottom:none;}
.payment-amount{font-family:'DM Serif Display',Georgia,serif;font-size:16px;font-weight:700;}
.payment-positive{color:var(--green);}
.payment-negative{color:var(--red);}
.ensemble-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.ensemble-name{font-family:'DM Serif Display',Georgia,serif;font-size:17px;margin-bottom:4px;}
.repertoire-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.repertoire-item:last-child{border-bottom:none;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600;margin-bottom:4px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.revenue-bar{display:flex;align-items:flex-end;gap:4px;height:80px;margin:12px 0;}
.revenue-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.revenue-fill{width:100%;border-radius:4px 4px 0 0;background:var(--accent);transition:height 0.3s;}
.revenue-label{font-size:9px;color:var(--muted);}
.revenue-amount{font-size:9px;font-weight:700;color:var(--accent);}
@media(min-width:700px){
  .stats{grid-template-columns:repeat(4,1fr);}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
}
@media(max-width:600px){
  .attendance-grid{grid-template-columns:80px repeat(7,1fr);font-size:10px;}
  .attendance-cell{padding:6px 3px;}
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

<body>
<div id="auth-gate" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;">
<div style="text-align:center;padding:40px;">
<div style="font-size:48px;margin-bottom:12px;">🎛️</div>
<div style="font-family:'DM Serif Display',Georgia,serif;font-size:26px;color:#D4943A;margin-bottom:4px;">Professor of Funk</div>
<div style="color:#888899;font-size:12px;margin-bottom:24px;">Admin Dashboard — Teacher Access</div>
<input id="auth-email" type="email" placeholder="Email" style="width:260px;padding:10px 16px;border-radius:10px;border:1px solid #2a2a35;background:#13131a;color:#e8e8ef;font-size:14px;text-align:center;outline:none;margin-bottom:8px;">
<br><input id="auth-pw" type="password" placeholder="Password" style="width:260px;padding:10px 16px;border-radius:10px;border:1px solid #2a2a35;background:#13131a;color:#e8e8ef;font-size:14px;text-align:center;outline:none;" onkeydown="if(event.key==='Enter')checkAuth()">
<br><button onclick="checkAuth()" style="margin-top:12px;padding:8px 32px;border-radius:10px;border:none;background:#D4943A;color:#000;font-weight:600;font-size:14px;cursor:pointer;">Sign In</button>
<div id="auth-err" style="color:#f87171;font-size:12px;margin-top:10px;display:none;">Invalid email or password</div>
<button onclick="resetPassword()" style="margin-top:8px;background:transparent;border:none;color:#888899;font-size:12px;cursor:pointer;text-decoration:underline;">Forgot Password?</button>
<div id="auth-reset-msg" style="color:#4ade80;font-size:12px;margin-top:6px;display:none;">Password reset email sent! Check your inbox.</div>
</div>
</div>
<div class="app" id="app" style="display:none;"></div>
<script>
/* ===== AUTH ===== */
let adminUser = null;

async function checkAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw = document.getElementById('auth-pw').value;
  if (!email || !pw) { document.getElementById('auth-err').style.display = 'block'; return; }
  try {
    const cred = await firebase.auth().signInWithEmailAndPassword(email, pw);
    adminUser = cred.user;
    showApp();
  } catch (e) {
    console.error('Auth failed:', e);
    document.getElementById('auth-err').style.display = 'block';
  }
}

async function resetPassword() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email) { alert('Please enter your email address first.'); return; }
  try {
    await firebase.auth().sendPasswordResetEmail(email);
    document.getElementById('auth-reset-msg').style.display = 'block';
    document.getElementById('auth-err').style.display = 'none';
  } catch (e) {
    alert('Could not send reset email: ' + e.message);
  }
}

async function showApp() {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadLocalData();
  setupRealtimeSync();
  render();
}

function logout() {
  firebase.auth().signOut();
  adminUser = null;
  document.getElementById('auth-gate').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-pw').value = '';
  document.getElementById('auth-err').style.display = 'none';
}

/* ===== FIREBASE SETUP ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBAVSC2g5xfnUXqkBoBX8TspITgDg_4FMo",
  authDomain: "professor-of-funk.firebaseapp.com",
  databaseURL: "https://professor-of-funk-default-rtdb.firebaseio.com",
  projectId: "professor-of-funk",
  storageBucket: "professor-of-funk.firebasestorage.app",
  messagingSenderId: "409198973109",
  appId: "1:409198973109:web:1c2aa4fd4611130b236efc"
};
const fbApp = firebase.initializeApp(firebaseConfig);
const fbDb = firebase.database();
const DB_ROOT = "professorOfFunk";

// Secondary app for creating student auth accounts without signing out admin
const secondaryApp = firebase.initializeApp(firebaseConfig, 'secondary');

async function createStudentAuth(studentId, accessCode) {
  try {
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(
      studentId + '@professoroffunk.app',
      accessCode + '!PoF'
    );
    await secondaryApp.auth().signOut();
    return cred.user.uid;
  } catch (e) {
    if (e.code === 'auth/email-already-in-use') {
      console.warn('Student auth account already exists for', studentId);
      try {
        const cred = await secondaryApp.auth().signInWithEmailAndPassword(
          studentId + '@professoroffunk.app',
          accessCode + '!PoF'
        );
        const uid = cred.user.uid;
        await secondaryApp.auth().signOut();
        return uid;
      } catch (e2) {
        console.error('Could not retrieve existing student UID:', e2);
        return null;
      }
    }
    console.error('Failed to create student auth:', e);
    return null;
  }
}

async function createParentAuth(parentId, accessCode) {
  try {
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(
      parentId + '@parent.professoroffunk.app',
      accessCode + '!PoF'
    );
    await secondaryApp.auth().signOut();
    return cred.user.uid;
  } catch (e) {
    if (e.code === 'auth/email-already-in-use') {
      console.warn('Parent auth account already exists for', parentId);
      try {
        const cred = await secondaryApp.auth().signInWithEmailAndPassword(
          parentId + '@parent.professoroffunk.app',
          accessCode + '!PoF'
        );
        const uid = cred.user.uid;
        await secondaryApp.auth().signOut();
        return uid;
      } catch (e2) {
        console.error('Could not retrieve existing parent UID:', e2);
        return null;
      }
    }
    console.error('Failed to create parent auth:', e);
    return null;
  }
}

async function ensureParentRecord(studentKey, parentName, parentEmail, parentAccessCode) {
  const parentId = parentAccessCode.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/^-|-$/g, '');
  if (!localData.parents) localData.parents = {};
  let parent = localData.parents[parentId];
  let authUid;
  if (!parent) {
    authUid = await createParentAuth(parentId, parentAccessCode);
    parent = {
      profile: { name: parentName, email: parentEmail, accessCode: parentAccessCode, authUid: authUid || null },
      children: {}
    };
  } else {
    authUid = parent.profile.authUid;
  }
  parent.children[studentKey] = true;
  localData.parents[parentId] = parent;
  await fbSave("parents/" + parentId, parent);
  await fbSave("meta/parentAccessCodes/" + parentAccessCode, parentId);
  return authUid;
}

// Auto-login if session still valid
firebase.auth().onAuthStateChanged(user => {
  if (user && !adminUser) {
    adminUser = user;
    showApp();
  }
});
function dbRef(path) { return fbDb.ref(DB_ROOT + "/" + path); }
let skipSync = false;

function toArray(val) {
  if (Array.isArray(val)) return val;
  if (val && typeof val === 'object') return Object.values(val);
  return [];
}

async function fbLoad(key, fallback) {
  try {
    const snap = await dbRef(key).once("value");
    const val = snap.val();
    return val !== null ? val : fallback;
  } catch(e) {
    console.warn("Firebase read failed for " + key, e);
    return fallback;
  }
}

async function fbSave(key, val) {
  try { await dbRef(key).set(val); } catch(e) { console.warn("Firebase write failed for " + key, e); }
}

function onDataChange(key, callback) {
  const ref = dbRef(key);
  ref.on("value", snap => { const val = snap.val(); if (val !== null && !skipSync) callback(val); });
  return () => ref.off("value");
}

/* ===== DATA LAYER ===== */
let localData = null;

async function loadLocalData() {
  const [students, ensembles, lessonTranscripts, parents] = await Promise.all([
    fbLoad("students", {}),
    fbLoad("ensembles", {}),
    fbLoad("lessonTranscripts", []),
    fbLoad("parents", {})
  ]);
  // Normalize new schema: programs, payments, attendance are objects
  Object.keys(students).forEach(k => {
    if (!students[k].programs || typeof students[k].programs !== 'object') students[k].programs = {};
    if (!students[k].payments || typeof students[k].payments !== 'object') students[k].payments = {};
    if (!students[k].attendance || typeof students[k].attendance !== 'object') students[k].attendance = {};
  });
  Object.keys(ensembles).forEach(k => {
    ensembles[k].repertoire = toArray(ensembles[k].repertoire);
    ensembles[k].assignments = toArray(ensembles[k].assignments);
    if (ensembles[k].info) ensembles[k].info.members = toArray(ensembles[k].info.members);
  });
  localData = { students, ensembles, lessonTranscripts: toArray(lessonTranscripts), parents };
}

function saveLocalData(paths) {
  if (!localData) return;
  // Safety: never overwrite students with empty data
  if (!paths || paths.includes('students')) {
    if (!localData.students || Object.keys(localData.students).length === 0) {
      console.error('SAFETY: Refusing to save empty students data — aborting save');
      return;
    }
  }
  skipSync = true;
  // If specific paths given, only write those; otherwise write all
  const all = !paths;
  if (all || paths.includes('students')) fbSave("students", localData.students);
  if (all || paths.includes('ensembles')) fbSave("ensembles", localData.ensembles);
  if (all || paths.includes('lessonTranscripts')) fbSave("lessonTranscripts", localData.lessonTranscripts || []);
  if (all || paths.includes('parents')) fbSave("parents", localData.parents || {});
  setTimeout(() => { skipSync = false; }, 500);
}

function setupRealtimeSync() {
  onDataChange("students", val => {
    if (!localData) return;
    Object.keys(val).forEach(k => {
      if (!val[k].programs || typeof val[k].programs !== 'object') val[k].programs = {};
      if (!val[k].payments || typeof val[k].payments !== 'object') val[k].payments = {};
      if (!val[k].attendance || typeof val[k].attendance !== 'object') val[k].attendance = {};
    });
    localData.students = val;
    render();
  });
  onDataChange("ensembles", val => {
    if (!localData) return;
    Object.keys(val).forEach(k => {
      val[k].repertoire = toArray(val[k].repertoire);
      val[k].assignments = toArray(val[k].assignments);
      if (val[k].info) val[k].info.members = toArray(val[k].info.members);
    });
    localData.ensembles = val;
    render();
  });
  onDataChange("lessonTranscripts", val => {
    if (!localData) return;
    localData.lessonTranscripts = toArray(val);
    render();
  });
}

/* ===== STATE ===== */
let currentTab = 0;
let paymentStudent = null;
let showAddStudent = false;
let showAddEnsemble = false;
let editingStudent = null;   // key of student being edited, or null
let editingEnsemble = null;  // key of ensemble being edited, or null
let editingSong = null;      // { ensKey, songId } or null
let addingSongTo = null;     // ensemble key, or null
let assigningSong = null;    // { ensKey, songId, songTitle } or null
let attendanceProgram = null; // selected program filter for attendance tab

/* ===== HELPERS ===== */
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'class' || k === 'className') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat(9).forEach(c => { if (c == null || c === false) return; el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return el;
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function fmtDateFull(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtCurrency(n) { return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

/* ===== BILLING COMPUTATION (new schema) ===== */
function computeStudentBilling(studentKey) {
  const s = localData.students[studentKey];
  if (!s) return { totalTuition: 0, totalPaid: 0, tuitionOwed: 0, invoiceStatus: 'Paid', totalClasses: 0, perProgram: {} };
  let totalTuition = 0, totalClasses = 0;
  const perProgram = {};
  Object.entries(s.programs || {}).forEach(([pid, prog]) => {
    const attended = Object.values((s.attendance || {})[pid] || {})
      .filter(a => a.present).length;
    totalClasses += attended;
    const tuition = attended * prog.rate;
    totalTuition += tuition;
    perProgram[pid] = { attended, tuition, rate: prog.rate, name: prog.name };
  });
  const totalPaid = Object.values(s.payments || {}).reduce((sum, p) => sum + (p.amount || 0), 0);
  const tuitionOwed = totalTuition - totalPaid;
  const invoiceStatus = tuitionOwed > 0 ? 'Unpaid' : tuitionOwed < 0 ? 'Overpaid' : 'Paid';
  return { totalTuition, totalPaid, tuitionOwed, invoiceStatus, totalClasses, perProgram };
}

function getBalance(studentKey) {
  return computeStudentBilling(studentKey).tuitionOwed;
}

function getAttendanceRate(studentKey) {
  const s = localData.students[studentKey];
  if (!s) return 100;
  let attended = 0, total = 0;
  Object.entries(s.attendance || {}).forEach(([pid, dates]) => {
    Object.values(dates).forEach(a => {
      total++;
      if (a.present) attended++;
    });
  });
  return total ? Math.round(attended / total * 100) : 100;
}

function getStatusColor(status) {
  switch (status) {
    case 'Paid': return 'var(--green)';
    case 'Unpaid': return 'var(--red)';
    case 'Overpaid': return 'var(--blue)';
    default: return 'var(--muted)';
  }
}

function getStatusBadge(status) {
  switch (status) {
    case 'Paid': return 'badge-green';
    case 'Unpaid': return 'badge-red';
    case 'Overpaid': return 'badge-blue';
    default: return 'badge-accent';
  }
}

function getStudentProgramNames(studentKey) {
  const s = localData.students[studentKey];
  if (!s || !s.programs) return '';
  return Object.values(s.programs).map(p => p.name).join(', ');
}

/* ===== ENSEMBLE MEMBERSHIP SYNC ===== */
function syncEnsembleMembership(studentName, oldEnsembleId, newEnsembleId) {
  // Remove student from old ensemble's member list
  if (oldEnsembleId && localData.ensembles[oldEnsembleId]) {
    const members = localData.ensembles[oldEnsembleId].info.members || [];
    const idx = members.indexOf(studentName);
    if (idx !== -1) members.splice(idx, 1);
    localData.ensembles[oldEnsembleId].info.members = members;
  }
  // Add student to new ensemble's member list
  if (newEnsembleId && localData.ensembles[newEnsembleId]) {
    const members = localData.ensembles[newEnsembleId].info.members || [];
    if (!members.includes(studentName)) members.push(studentName);
    localData.ensembles[newEnsembleId].info.members = members;
  }
}

function getEnsembleForStudent(studentKey) {
  const s = localData.students[studentKey];
  if (!s || !s.programs) return null;
  const ensProg = Object.values(s.programs).find(pr => pr.type === 'ensemble' && pr.ensembleId);
  if (!ensProg) return null;
  return localData.ensembles[ensProg.ensembleId] || null;
}

function renderStudents() {
  const students = localData.students;
  const keys = Object.keys(students).filter(k => students[k].profile.active !== false);
  const inactiveKeys = Object.keys(students).filter(k => students[k].profile.active === false);
  const totalStudents = keys.length;
  const now = new Date();
  const totalRevenue = keys.reduce((sum, k) => {
    return sum + Object.values(students[k].payments || {}).filter(p => {
      const d = new Date(p.date + 'T12:00:00');
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).reduce((s, p) => s + (p.amount || 0), 0);

  const outstanding = keys.reduce((sum, k) => sum + Math.max(0, computeStudentBilling(k).tuitionOwed), 0);

      h('div', { class: 'stat' }, h('div', { class: 'stat-label' }, 'Total Tuition'), h('div', { class: 'stat-value' }, fmtCurrency(keys.reduce((s, k) => s + computeStudentBilling(k).totalTuition, 0))))

function renderAttendance() {
  const students = localData.students;
  const allKeys = Object.keys(students).filter(k => students[k].profile.active !== false);

  // Build list of all programs across all students
  const programSet = {};
  allKeys.forEach(k => {
    Object.entries(students[k].programs || {}).forEach(([pid, prog]) => {
      if (!programSet[pid]) programSet[pid] = prog.name;
    });
  });
  const programIds = Object.keys(programSet);

  // Auto-select first program if none selected
  if (!attendanceProgram && programIds.length > 0) attendanceProgram = programIds[0];

  const isAllView = attendanceProgram === '__all__';

  // Filter students enrolled in selected program
  const filteredKeys = isAllView ? allKeys : allKeys.filter(k => (students[k].programs || {})[attendanceProgram]);

  // Get dates for this program's attendance (last 8 unique dates across all students)
  const dateSet = new Set();
  filteredKeys.forEach(k => {
    if (isAllView) {
      Object.values(students[k].attendance || {}).forEach(progAtt => {
        Object.keys(progAtt).forEach(d => dateSet.add(d));
      });
    } else {
      Object.keys((students[k].attendance || {})[attendanceProgram] || {}).forEach(d => dateSet.add(d));
    }
  });
  const allDates = Array.from(dateSet).sort();
  const dates = allDates.slice(-8); // Show last 8 dates
  const today = new Date().toISOString().slice(0, 10);

  return h('div', { class: 'pad' },
    h('h2', { class: 'section-title' }, 'Attendance'),
    h('p', { class: 'section-sub' }, 'Track per-program attendance'),

    // Program filter bar
    h('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap', marginBottom: '16px' } },
      ...programIds.map(pid =>
        h('button', {
          class: 'btn-outline' + (attendanceProgram === pid ? ' active' : ''),
          onClick: () => { attendanceProgram = pid; render(); }
        }, programSet[pid])
      ),
      h('button', {
        class: 'btn-outline' + (isAllView ? ' active' : ''),
        onClick: () => { attendanceProgram = '__all__'; render(); }
      }, 'All')
    ),

    // Mark Today button (only for non-All view)
    !isAllView ? h('div', { style: { marginBottom: '12px' } },
      h('button', { class: 'btn btn-sm', onClick: () => {
        filteredKeys.forEach(k => {
          if (!students[k].attendance) students[k].attendance = {};
          if (!students[k].attendance[attendanceProgram]) students[k].attendance[attendanceProgram] = {};
          if (!students[k].attendance[attendanceProgram][today]) {
            students[k].attendance[attendanceProgram][today] = { present: true };
            fbSave("students/" + k + "/attendance/" + attendanceProgram + "/" + today, { present: true });
          }
        });
        render();
      }}, 'Mark All Present Today (' + fmtDate(today) + ')')
    ) : '',

    // Attendance grid
    h('div', { style: { overflowX: 'auto', marginBottom: '16px' } },
      h('div', { class: 'attendance-grid', style: { gridTemplateColumns: '120px repeat(' + dates.length + ',1fr)' } },
        // Header row
        h('div', { class: 'attendance-cell attendance-header attendance-name' }, 'Student'),
        ...dates.map(d => h('div', { class: 'attendance-cell attendance-header' }, fmtDate(d))),

        // Student rows
        ...filteredKeys.flatMap(key => {
          const s = students[key];
          return [
            h('div', { class: 'attendance-cell attendance-name' }, s.profile.name),
            ...dates.map(d => {
              if (isAllView) {
                // All view: show aggregate (present in any program)
                let present = false;
                Object.values(s.attendance || {}).forEach(progAtt => {
                  if (progAtt[d] && progAtt[d].present) present = true;
                });
                return h('div', { class: 'attendance-cell', style: { color: present ? 'var(--green)' : 'var(--muted)', fontSize: '16px' } }, present ? '✓' : '—');
              }
              // Per-program view: interactive
              const att = ((s.attendance || {})[attendanceProgram] || {})[d];
              let icon = '—', color = 'var(--muted)';
              if (att) {
                if (att.present) { icon = '✓'; color = 'var(--green)'; }
                else { icon = '✗'; color = 'var(--red)'; }
              }
              return h('div', {
                class: 'attendance-cell attendance-toggle',
                style: { color },
                onClick: () => {
                  if (!s.attendance) s.attendance = {};
                  if (!s.attendance[attendanceProgram]) s.attendance[attendanceProgram] = {};
                  const cur = s.attendance[attendanceProgram][d];
                  if (!cur) {
                    s.attendance[attendanceProgram][d] = { present: true };
                  } else if (cur.present) {
                    s.attendance[attendanceProgram][d] = { present: false };
                  } else {
                    delete s.attendance[attendanceProgram][d];
                  }
                  fbSave("students/" + key + "/attendance/" + attendanceProgram + "/" + d, s.attendance[attendanceProgram][d] || null);
                  render();
                }
              }, icon);
            })
          ];
        })
      )
    ),

    h('div', { class: 'card' },
      h('div', { class: 'label' }, 'Legend'),
      h('div', { style: { display: 'flex', gap: '16px', fontSize: '12px' } },
        h('span', { style: { color: 'var(--green)' } }, '✓ Present'),
        h('span', { style: { color: 'var(--red)' } }, '✗ Absent'),
        h('span', { style: { color: 'var(--muted)' } }, '— No record')
      ),
      !isAllView ? h('p', { style: { color: 'var(--muted)', fontSize: '11px', marginTop: '6px' } }, 'Click to cycle: present → absent → clear') : ''
    ),

    h('div', { class: 'card' },
      h('div', { class: 'label' }, 'Attendance Summary'),
      ...filteredKeys.map(key => {
        const s = students[key];
        let attended = 0, total = 0;
        if (isAllView) {
          Object.values(s.attendance || {}).forEach(progAtt => {
            Object.values(progAtt).forEach(a => { total++; if (a.present) attended++; });
          });
        } else {
          const progAtt = (s.attendance || {})[attendanceProgram] || {};
          Object.values(progAtt).forEach(a => { total++; if (a.present) attended++; });
        }
        const rate = total ? Math.round(attended / total * 100) : 100;
        return h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid var(--border)' } },
          h('span', { style: { fontWeight: '600', fontSize: '13px' } }, s.profile.name),
          h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
            h('span', { style: { fontSize: '11px', color: 'var(--muted)' } }, attended + '/' + total + ' lessons'),
            h('span', { style: { fontSize: '13px', fontWeight: '700', color: rate >= 80 ? 'var(--green)' : rate >= 60 ? 'var(--yellow)' : 'var(--red)' } }, rate + '%')
          )
        );
      })
    )
  );
}

      ),

      h('div', { class: 'stats' },

        h('div', { class: 'stat' }, h('div', { class: 'stat-label' }, 'Total Tuition'), h('div', { class: 'stat-value' }, fmtCurrency(billing.totalTuition))),
        h('div', { class: 'stat' }, h('div', { class: 'stat-label' }, 'Total Paid'), h('div', { class: 'stat-value', style: { color: 'var(--green)' } }, fmtCurrency(billing.totalPaid))),
        h('div', { class: 'stat' }, h('div', { class: 'stat-label' }, 'Classes'), h('div', { class: 'stat-value' }, '' + billing.totalClasses))
      ),

      // Per-program breakdown
      h('div', { class: 'card' },
        h('div', { style: { fontWeight: '600', fontSize: '13px', marginBottom: '10px' } }, 'Billing Breakdown (computed from attendance)'),
        ...Object.entries(billing.perProgram).map(([pid, pp]) =>
          h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid var(--border)' } },
            h('div', {},
              h('div', { style: { fontWeight: '600', fontSize: '13px' } }, pp.name),
              h('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, pp.attended + ' classes × $' + pp.rate)
            ),
            h('div', { style: { fontFamily: "'DM Serif Display',Georgia,serif", fontSize: '16px', fontWeight: '700' } }, fmtCurrency(pp.tuition))
          )
        ),
        h('div', { style: { display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontWeight: '700', fontSize: '13px' } },
          h('span', {}, 'Total Tuition'),
          h('span', {}, fmtCurrency(billing.totalTuition))
        ),
        h('div', { style: { display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: '13px', color: 'var(--green)' } },
          h('span', {}, 'Total Paid'),
          h('span', {}, '-' + fmtCurrency(billing.totalPaid))
        ),
        h('div', { style: { display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontWeight: '700', fontSize: '15px', borderTop: '2px solid var(--border)', color: billing.tuitionOwed > 0 ? 'var(--red)' : billing.tuitionOwed < 0 ? 'var(--blue)' : 'var(--green)' } },
          h('span', {}, billing.tuitionOwed >= 0 ? 'Balance Due' : 'Credit'),
          h('span', {}, (billing.tuitionOwed < 0 ? '-' : '') + fmtCurrency(billing.tuitionOwed))
        )
      ),

      // Record payment
      h('div', { class: 'card card-accent' },
        h('div', { style: { fontWeight: '600', fontSize: '13px', marginBottom: '10px' } }, 'Record Payment'),
        h('div', { class: 'form-row' },
          h('div', { class: 'form-group' },
            h('label', {}, 'Amount'),
            h('input', { class: 'input', id: 'pay-amount', type: 'number', value: '' + Math.max(0, billing.tuitionOwed) })
          ),
          h('div', { class: 'form-group' },
            h('label', {}, 'Method'),
            h('select', { class: 'input', id: 'pay-method' },
              h('option', { value: 'Venmo' }, 'Venmo'),
              h('option', { value: 'Zelle' }, 'Zelle'),
              h('option', { value: 'Cash' }, 'Cash'),
              h('option', { value: 'Check' }, 'Check'),
              h('option', { value: 'PayPal' }, 'PayPal'),
              h('option', { value: 'Other' }, 'Other')
            )
          )
        ),
        h('div', { class: 'form-group' },
          h('label', {}, 'Note'),
          h('input', { class: 'input', id: 'pay-note', placeholder: 'e.g. @username, check #, etc.' })
        ),
        h('button', { class: 'btn', onClick: () => {
          const amount = parseFloat(document.getElementById('pay-amount').value);
          const method = document.getElementById('pay-method').value;
          const note = document.getElementById('pay-note').value;
          if (!amount || amount <= 0) return;
          const payId = uid();
          if (!s.payments) s.payments = {};
          s.payments[payId] = { date: new Date().toISOString().slice(0, 10), amount, method, note, programId: null };
          fbSave("students/" + paymentStudent + "/payments/" + payId, s.payments[payId]);
          render();
        }}, 'Record Payment')
      ),

      // Payment history
      h('div', { class: 'card' },
        h('div', { style: { fontWeight: '600', fontSize: '13px', marginBottom: '10px' } }, 'Payment History (' + paymentList.length + ')'),
        ...paymentList.map(entry =>
          h('div', { class: 'payment-row' },
            h('div', { style: { width: '80px' } },
              h('span', { class: 'payment-amount payment-positive' }, '+' + fmtCurrency(entry.amount))
            ),
            h('div', { style: { flex: '1', minWidth: '0' } },
              h('div', { style: { fontSize: '12px' } }, entry.note || 'Payment'),
              h('div', { style: { fontSize: '10px', color: 'var(--muted)' } },
                fmtDateFull(entry.date) + (entry.method ? ' · ' + entry.method : '') + (entry.programId ? ' · ' + entry.programId : ''))
            ),
            h('span', { class: 'badge badge-green' }, 'payment')
          )
        ),
        paymentList.length === 0 ? h('div', { style: { color: 'var(--muted)', fontSize: '12px', padding: '8px 0' } }, 'No payments recorded') : ''
      )
    );
  }

  // Monthly revenue calculation
  const now = new Date();
  const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const revenueByMonth = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const month = d.getMonth();
    const year = d.getFullYear();
    let total = 0;
    keys.forEach(k => {
      Object.values(students[k].payments || {}).forEach(p => {
        const pd = new Date(p.date + 'T12:00:00');
        if (pd.getMonth() === month && pd.getFullYear() === year) total += (p.amount || 0);
      });
    });
    revenueByMonth.push({ label: monthNames[month], amount: total });
  }
  const maxRevenue = Math.max(...revenueByMonth.map(r => r.amount), 1);

  return h('div', { class: 'pad' },
    h('h2', { class: 'section-title' }, 'Payments'),
    h('p', { class: 'section-sub' }, 'Tuition computed from attendance — record payments only'),

    h('div', { class: 'card' },
      h('div', { style: { fontWeight: '600', fontSize: '13px', marginBottom: '8px' } }, 'Monthly Revenue'),
      h('div', { class: 'revenue-bar' },
        ...revenueByMonth.map(r =>
          h('div', { class: 'revenue-col' },
            h('div', { class: 'revenue-amount' }, r.amount > 0 ? fmtCurrency(r.amount) : ''),
            h('div', { class: 'revenue-fill', style: { height: Math.max(4, (r.amount / maxRevenue) * 60) + 'px' } }),
            h('div', { class: 'revenue-label' }, r.label)
          )
        )
      )
    ),

    ...keys.map(key => {
      const s = students[key];
      const billing = computeStudentBilling(key);
      const programNames = getStudentProgramNames(key);
      return h('div', { class: 'student-card', onClick: () => { paymentStudent = key; render(); } },
        h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
          h('div', {},
            h('div', { class: 'student-name' }, s.profile.name),
            h('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, programNames + ' · ' + billing.totalClasses + ' classes')
          ),
          h('div', { style: { textAlign: 'right' } },
            h('div', { style: { fontFamily: "'DM Serif Display',Georgia,serif", fontSize: '20px', fontWeight: '700', color: billing.tuitionOwed > 0 ? 'var(--red)' : billing.tuitionOwed < 0 ? 'var(--blue)' : 'var(--green)' } }, (billing.tuitionOwed < 0 ? '-' : '') + fmtCurrency(billing.tuitionOwed)),
            h('span', { class: 'badge ' + getStatusBadge(billing.invoiceStatus) }, billing.invoiceStatus)
          )
        )
      );
    })
  );
}

      h('div', { class: 'form-group' },
        h('label', {}, 'Schedule'),
        h('input', { class: 'input', id: 'new-ens-schedule', placeholder: 'e.g. Sundays 2:00-4:30 PM' })
      ),
      h('div', { class: 'form-group' },
        h('label', {}, 'Location'),
        h('input', { class: 'input', id: 'new-ens-location', placeholder: 'e.g. Studio S, Oakland', value: 'Studio S, Oakland' })
      )
    ),
    renderMemberPicker(newEnsMembers, (name) => {
      const idx = newEnsMembers.indexOf(name);
      if (idx === -1) newEnsMembers.push(name); else newEnsMembers.splice(idx, 1);
      render();
    }, 'new-ens-member-input'),
    h('button', { class: 'btn', style: { marginTop: '4px' }, onClick: () => {
      const name = document.getElementById('new-ens-name').value.trim();
      const schedule = document.getElementById('new-ens-schedule').value.trim();
      const location = document.getElementById('new-ens-location').value.trim();
      if (!name) { alert('Please enter an ensemble name.'); return; }
      const key = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      if (localData.ensembles[key]) { alert('An ensemble with a similar name already exists.'); return; }
      localData.ensembles[key] = {
        info: { name, schedule, location, members: [...newEnsMembers] },
        repertoire: []
      };
      // Add program entry for students selected as members
      for (const memberName of newEnsMembers) {
        const studentEntry = Object.entries(localData.students).find(([, s]) => s.profile.name === memberName);
        if (studentEntry) {
          const [sKey, sData] = studentEntry;
          if (!sData.programs) sData.programs = {};
          if (!sData.programs[key]) {
            sData.programs[key] = { type: 'ensemble', name, ensembleId: key, rate: 62.50, lessonDay: null, lessonTime: null };
            fbSave("students/" + sKey + "/programs/" + key, sData.programs[key]);
          }
        }
      }
      saveLocalData(['ensembles']);
      showAddEnsemble = false;
      newEnsMembers = [];
      render();
    }}, 'Add Ensemble')
  );
}

function renderEditEnsembleForm(key) {
  const ens = localData.ensembles[key];
  const info = ens.info;
  // Initialize editEnsMembers from current ensemble when first opening
  if (editingEnsemble === key && editEnsMembers._key !== key) {
    editEnsMembers = [...(info.members || [])];
    editEnsMembers._key = key;
  }
  return h('div', { class: 'card card-accent', style: { marginBottom: '16px' } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' } },
      h('div', { style: { fontWeight: '600', fontSize: '15px' } }, 'Edit Ensemble — ' + info.name),
      h('button', { class: 'btn-outline', onClick: () => { editingEnsemble = null; editEnsMembers = []; render(); } }, '✕ Cancel')
    ),
    h('div', { class: 'form-group' },
      h('label', {}, 'Ensemble Name'),
      h('input', { class: 'input', id: 'edit-ens-name', value: info.name })
    ),
    h('div', { class: 'form-row' },
      h('div', { class: 'form-group' },
        h('label', {}, 'Schedule'),
        h('input', { class: 'input', id: 'edit-ens-schedule', value: info.schedule || '' })
      ),
      h('div', { class: 'form-group' },
        h('label', {}, 'Location'),
        h('input', { class: 'input', id: 'edit-ens-location', value: info.location || '' })
      )
    ),
    renderMemberPicker(editEnsMembers, (name) => {
      const idx = editEnsMembers.indexOf(name);
      if (idx === -1) editEnsMembers.push(name); else editEnsMembers.splice(idx, 1);
      render();
    }, 'edit-ens-member-input'),
    h('div', { style: { display: 'flex', gap: '8px', marginTop: '4px' } },
      h('button', { class: 'btn', onClick: () => {
        const name = document.getElementById('edit-ens-name').value.trim();
        const schedule = document.getElementById('edit-ens-schedule').value.trim();
        const location = document.getElementById('edit-ens-location').value.trim();
        if (!name) { alert('Ensemble name is required.'); return; }
        const oldMembers = ens.info.members || [];
        const newMembers = [...editEnsMembers];
        // Remove program entry for removed members
        for (const memberName of oldMembers) {
          if (!newMembers.includes(memberName)) {
            const studentEntry = Object.entries(localData.students).find(([, s]) => s.profile.name === memberName);
            if (studentEntry) {
              const [sKey, sData] = studentEntry;
              if (sData.programs && sData.programs[key]) {
                delete sData.programs[key];
                fbSave("students/" + sKey + "/programs/" + key, null);
              }
            }
          }
        }
        // Add program entry for added members
        for (const memberName of newMembers) {
          if (!oldMembers.includes(memberName)) {
            const studentEntry = Object.entries(localData.students).find(([, s]) => s.profile.name === memberName);
            if (studentEntry) {
              const [sKey, sData] = studentEntry;
              if (!sData.programs) sData.programs = {};
              if (!sData.programs[key]) {
                sData.programs[key] = { type: 'ensemble', name, ensembleId: key, rate: 62.50, lessonDay: null, lessonTime: null };
                fbSave("students/" + sKey + "/programs/" + key, sData.programs[key]);
              }
            }
          }
        }
        ens.info = { ...ens.info, name, schedule, location, members: newMembers };
        saveLocalData(['ensembles']);
        editingEnsemble = null;
        editEnsMembers = [];
        render();
      }}, 'Save Changes'),
      h('button', { class: 'btn-outline', style: { color: 'var(--red)', borderColor: 'var(--red)' }, onClick: () => {
        if (!confirm('Delete ' + info.name + '? This removes the ensemble and all its repertoire. This cannot be undone.')) return;
        // Remove this ensemble's program entry from all students
        for (const [sKey, student] of Object.entries(localData.students)) {
          if (student.programs && student.programs[key]) {
            delete student.programs[key];
            fbSave("students/" + sKey + "/programs/" + key, null);
          }
        }
        delete localData.ensembles[key];
        saveLocalData(['ensembles']);
        editingEnsemble = null;
        render();
      }}, 'Delete Ensemble')
    )
  );
}

function renderEnsembles() {
  const ensembles = localData.ensembles;
  const statusColors = {
    'performance-ready': { badge: 'badge-green', label: 'Performance Ready' },
    'learning': { badge: 'badge-blue', label: 'Learning' },
    'retired': { badge: 'badge-purple', label: 'Retired' }
  };

  return h('div', { class: 'pad' },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } },
      h('h2', { class: 'section-title' }, 'Ensembles'),
      !showAddEnsemble ? h('button', { class: 'btn btn-sm', onClick: () => { showAddEnsemble = true; render(); } }, '+ Add Ensemble') : ''
    ),
    h('p', { class: 'section-sub' }, Object.keys(ensembles).length + ' active ensembles'),

    showAddEnsemble ? renderAddEnsembleForm() : '',

    ...Object.entries(ensembles).map(([key, ens]) => {
      if (editingEnsemble === key) return renderEditEnsembleForm(key);
      const rep = ens.repertoire || [];
      const ready = rep.filter(r => r.status === 'performance-ready').length;
      const learning = rep.filter(r => r.status === 'learning').length;

      return h('div', { class: 'ensemble-card' },
        h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' } },
          h('div', {},
            h('div', { class: 'ensemble-name' }, ens.info.name),
            h('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, ens.info.schedule + ' · ' + ens.info.location)
          ),
          h('div', { style: { display: 'flex', gap: '6px', alignItems: 'center' } },
            h('span', { class: 'badge badge-accent' }, rep.length + ' songs'),
            h('button', { class: 'btn-outline', style: { padding: '2px 8px', fontSize: '10px' }, onClick: () => { editingEnsemble = key; render(); } }, 'Edit')
          )
        ),

        h('div', { style: { marginBottom: '10px' } },
          h('div', { class: 'label' }, 'Members'),
          h('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap' } },
            ...(ens.info.members || []).map(m =>
              h('span', { style: { padding: '2px 10px', borderRadius: '10px', fontSize: '11px', background: 'var(--surface2)', border: '1px solid var(--border)', color: 'var(--text)' } }, m)
            )
          )
        ),

        h('div', { style: { display: 'flex', gap: '12px', marginBottom: '10px', fontSize: '11px' } },
          h('span', { style: { color: 'var(--green)' } }, ready + ' ready'),
          h('span', { style: { color: 'var(--blue)' } }, learning + ' learning'),
          rep.filter(r => r.status === 'retired').length > 0 ? h('span', { style: { color: 'var(--purple)' } }, rep.filter(r => r.status === 'retired').length + ' retired') : ''
        ),

        h('div', {},
          h('div', { class: 'label' }, 'Repertoire'),
          ...rep.map(song => {
            // Editing this song?
            if (editingSong && editingSong.ensKey === key && editingSong.songId === song.id) {
              return h('div', { style: { background: 'var(--surface2)', border: '1px solid var(--accent)', borderRadius: '8px', padding: '10px', marginBottom: '6px' } },
                h('div', { class: 'form-row' },
                  h('div', { class: 'form-group' },
                    h('label', {}, 'Title'),
                    h('input', { class: 'input', id: 'edit-song-title', value: song.title })
                  ),
                  h('div', { class: 'form-group' },
                    h('label', {}, 'Artist'),
                    h('input', { class: 'input', id: 'edit-song-artist', value: song.artist })
                  )
                ),
                h('div', { class: 'form-row' },
                  h('div', { class: 'form-group' },
                    h('label', {}, 'Status'),
                    h('select', { class: 'input', id: 'edit-song-status' },
                      ...['learning','performance-ready','retired'].map(st => h('option', { value: st, ...(st === song.status ? { selected: 'selected' } : {}) }, st === 'learning' ? 'Learning' : st === 'performance-ready' ? 'Performance Ready' : 'Retired'))
                    )
                  ),
                  h('div', { class: 'form-group' },
                    h('label', {}, 'Notes'),
                    h('input', { class: 'input', id: 'edit-song-notes', value: song.notes || '' })
                  )
                ),
                h('div', { style: { display: 'flex', gap: '6px', marginTop: '4px' } },
                  h('button', { class: 'btn btn-sm', onClick: () => {
                    song.title = document.getElementById('edit-song-title').value.trim() || song.title;
                    song.artist = document.getElementById('edit-song-artist').value.trim() || song.artist;
                    song.status = document.getElementById('edit-song-status').value;
                    song.notes = document.getElementById('edit-song-notes').value.trim();
                    saveLocalData(['ensembles']);
                    editingSong = null;
                    render();
                  }}, 'Save'),
                  h('button', { class: 'btn-outline', onClick: () => { editingSong = null; render(); } }, 'Cancel'),
                  h('button', { class: 'btn-outline', style: { color: 'var(--red)', borderColor: 'var(--red)', marginLeft: 'auto' }, onClick: () => {
                    if (!confirm('Remove "' + song.title + '" from repertoire?')) return;
                    const idx = ens.repertoire.findIndex(r => r.id === song.id);
                    if (idx !== -1) ens.repertoire.splice(idx, 1);
                    saveLocalData(['ensembles']);
                    editingSong = null;
                    render();
                  }}, 'Remove')
                )
              );
            }
            // Normal display — tap to edit
            const songEl = h('div', {},
              h('div', { class: 'repertoire-item', style: { cursor: 'pointer' }, onClick: () => { editingSong = { ensKey: key, songId: song.id }; render(); } },
                h('div', { style: { minWidth: '0' } },
                  h('div', { style: { fontSize: '13px', fontWeight: '600' } }, song.title),
                  h('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, song.artist + (song.notes ? ' — ' + song.notes : ''))
                ),
                h('div', { style: { display: 'flex', gap: '6px', alignItems: 'center' } },
                  h('button', { class: 'btn-outline', style: { padding: '2px 8px', fontSize: '10px' }, onClick: (e) => { e.stopPropagation(); assigningSong = { ensKey: key, songId: song.id, songTitle: song.title }; render(); } }, 'Assign'),
                  h('span', { class: 'badge ' + statusColors[song.status].badge }, statusColors[song.status].label)
                )
              ),
              // Inline assign form
              assigningSong && assigningSong.ensKey === key && assigningSong.songId === song.id
                ? (() => {
                    const members = (ens.info && ens.info.members) || [];
                    // Build student key lookup from member names
                    const memberStudents = members.map(name => {
                      const entry = Object.entries(localData.students).find(([, s]) => s.profile.name === name);
                      return entry ? { name, key: entry[0] } : { name, key: null };
                    });
                    return h('div', { style: { background: 'var(--surface2)', border: '1px solid var(--purple)', borderRadius: '8px', padding: '10px', marginBottom: '6px' } },
                      h('div', { style: { fontSize: '11px', color: 'var(--purple)', fontWeight: '600', marginBottom: '6px' } }, 'Assign: ' + song.title),
                      h('div', { class: 'form-row' },
                        h('div', { class: 'form-group' },
                          h('label', {}, 'For'),
                          h('select', { class: 'input', id: 'assign-student' },
                            h('option', { value: '' }, 'All Students'),
                            ...memberStudents.map(m => h('option', { value: m.key || '' }, m.name))
                          )
                        ),
                        h('div', { class: 'form-group' },
                          h('label', {}, 'Due Date (optional)'),
                          h('input', { class: 'input', id: 'assign-due', type: 'date' })
                        )
                      ),
                      h('div', { class: 'form-group' },
                        h('label', {}, 'Assignment Description'),
                        h('textarea', { class: 'input', id: 'assign-text', rows: '2', placeholder: 'e.g. Practice measures 1-16, focus on dynamics', style: { resize: 'vertical' } })
                      ),
                      h('div', { style: { display: 'flex', gap: '6px', marginTop: '4px' } },
                        h('button', { class: 'btn btn-sm', onClick: () => {
                          const text = document.getElementById('assign-text').value.trim();
                          if (!text) { alert('Assignment description is required.'); return; }
                          const dueDate = document.getElementById('assign-due').value || null;
                          const studentKey = document.getElementById('assign-student').value || null;
                          const studentName = studentKey ? (memberStudents.find(m => m.key === studentKey) || {}).name || null : null;
                          if (!ens.assignments) ens.assignments = [];
                          ens.assignments.push({ id: uid(), songId: song.id, songTitle: song.title, text, dueDate, assignedDate: new Date().toISOString().slice(0, 10), studentKey, studentName });
                          saveLocalData(['ensembles']);
                          assigningSong = null;
                          render();
                        }}, 'Save Assignment'),
                        h('button', { class: 'btn-outline', onClick: () => { assigningSong = null; render(); } }, 'Cancel')
                      )
                    );
                  })()
                : ''
            );
            return songEl;
          }),
          // Add song form or button
          addingSongTo === key
            ? h('div', { style: { background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: '8px', padding: '10px', marginTop: '8px' } },
                h('div', { class: 'form-row' },
                  h('div', { class: 'form-group' },
                    h('label', {}, 'Title'),
                    h('input', { class: 'input', id: 'add-song-title', placeholder: 'e.g. Superstition' })
                  ),
                  h('div', { class: 'form-group' },
                    h('label', {}, 'Artist'),
                    h('input', { class: 'input', id: 'add-song-artist', placeholder: 'e.g. Stevie Wonder' })
                  )
                ),
                h('div', { class: 'form-row' },
                  h('div', { class: 'form-group' },
                    h('label', {}, 'Status'),
                    h('select', { class: 'input', id: 'add-song-status' },
                      h('option', { value: 'learning' }, 'Learning'),
                      h('option', { value: 'performance-ready' }, 'Performance Ready'),
                      h('option', { value: 'retired' }, 'Retired')
                    )
                  ),
                  h('div', { class: 'form-group' },
                    h('label', {}, 'Notes'),
                    h('input', { class: 'input', id: 'add-song-notes', placeholder: 'Optional notes' })
                  )
                ),
                h('div', { style: { display: 'flex', gap: '6px', marginTop: '4px' } },
                  h('button', { class: 'btn btn-sm', onClick: () => {
                    const title = document.getElementById('add-song-title').value.trim();
                    const artist = document.getElementById('add-song-artist').value.trim();
                    const status = document.getElementById('add-song-status').value;
                    const notes = document.getElementById('add-song-notes').value.trim();
                    if (!title) { alert('Song title is required.'); return; }
                    if (!ens.repertoire) ens.repertoire = [];
                    ens.repertoire.push({ id: uid(), title, artist: artist || 'Unknown', status, notes });
                    saveLocalData(['ensembles']);
                    addingSongTo = null;
                    render();
                  }}, 'Add Song'),
                  h('button', { class: 'btn-outline', onClick: () => { addingSongTo = null; render(); } }, 'Cancel')
                )
              )
            : h('button', { class: 'btn-outline', style: { marginTop: '8px', fontSize: '11px' }, onClick: () => { addingSongTo = key; render(); } }, '+ Add Song')
        ),

        // Existing assignments
        ens.assignments && (Array.isArray(ens.assignments) ? ens.assignments : Object.values(ens.assignments)).length > 0
          ? h('div', { style: { marginTop: '12px' } },
              h('div', { class: 'label' }, 'Assignments'),
              ...(Array.isArray(ens.assignments) ? ens.assignments : Object.values(ens.assignments)).map(a =>
                h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', padding: '8px 10px', background: 'var(--surface2)', borderRadius: '8px', marginBottom: '4px' } },
                  h('div', { style: { minWidth: '0', flex: '1' } },
                    h('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--purple)' } }, a.songTitle + (a.dueDate ? ' — due ' + a.dueDate : '')),
                    h('div', { style: { fontSize: '10px', color: a.studentName ? 'var(--blue)' : 'var(--green)', fontWeight: '600', marginTop: '2px' } }, a.studentName ? a.studentName : 'All Students'),
                    h('div', { style: { fontSize: '12px', color: 'var(--text)', marginTop: '2px' } }, a.text),
                    h('div', { style: { fontSize: '10px', color: 'var(--muted)', marginTop: '2px' } }, 'Assigned ' + a.assignedDate)
                  ),
                  h('button', { class: 'btn-outline', style: { padding: '2px 6px', fontSize: '9px', color: 'var(--red)', borderColor: 'var(--red)', flexShrink: '0', marginLeft: '8px' }, onClick: () => {
                    if (!confirm('Remove this assignment?')) return;
                    const assignments = Array.isArray(ens.assignments) ? ens.assignments : Object.values(ens.assignments);
                    const idx = assignments.findIndex(x => x.id === a.id);
                    if (idx !== -1) assignments.splice(idx, 1);
                    ens.assignments = assignments;
                    saveLocalData(['ensembles']);
                    render();
                  }}, 'Remove')
                )
              )
            )
          : ''
      );
    })
  );
}

/* ===== RENDER ===== */
function render() {
  if (!localData) return;
  const app = document.getElementById('app');
  app.innerHTML = '';
  const tabs = [
    { icon: '👥', label: 'Students' },
    { icon: '📅', label: 'Attendance' },
    { icon: '💰', label: 'Payments' },
    { icon: '📝', label: 'Lessons' },
    { icon: '🎵', label: 'Ensembles' }
  ];

  // Header
  app.appendChild(h('div', { class: 'header' },
    h('div', { class: 'logo' },
      h('span', { class: 'logo-icon' }, '🎛️'),
      h('span', { class: 'logo-name' }, 'PROF OF FUNK'),
      h('span', { class: 'logo-sub' }, 'ADMIN')
    ),
    h('button', { class: 'header-logout', onClick: logout }, 'Sign Out')
  ));

  // Content
  const content = h('div', { class: 'content' });
  switch (currentTab) {
    case 0: content.appendChild(renderStudents()); break;
    case 1: content.appendChild(renderAttendance()); break;
    case 2: content.appendChild(renderPayments()); break;
    case 3: content.appendChild(renderLessonInput()); break;
    case 4: content.appendChild(renderEnsembles()); break;
  }
  app.appendChild(content);

  // Bottom nav
  app.appendChild(h('div', { class: 'bottom-nav' },
    ...tabs.map((t, i) => h('button', {
      class: 'nav-btn' + (currentTab === i ? ' active' : ''),
      onClick: () => { currentTab = i; paymentStudent = null; editingStudent = null; editingEnsemble = null; editingSong = null; addingSongTo = null; assigningSong = null; showAddStudent = false; showAddEnsemble = false; render(); }
    },
      h('span', { class: 'nav-icon' }, t.icon),
      t.label
    ))
  ));
}

/* ===== SERVICE WORKER ===== */
if ('serviceWorker' in navigator) {
  const sw = `self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",e=>e.respondWith(fetch(e.request).catch(()=>new Response("Offline",{status:503}))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))).catch(() => {});
}
</script>
