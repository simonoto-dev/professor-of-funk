<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1a1a24; --border:#2a2a35;
  --accent:#D4943A; --accent-glow:rgba(212,148,58,0.15); --accent-dim:#7A4A28;
  --green:#4ade80; --red:#f87171; --blue:#60a5fa; --purple:#c084fc; --yellow:#fbbf24;
  --text:#e8e8ef; --muted:#888899;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans','Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;}
input,textarea,select,button{font-family:inherit;font-size:inherit;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:var(--safe-top);}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:52px;flex-shrink:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;margin-right:auto;}
.logo-icon{font-size:18px;}
.logo-name{font-family:'DM Serif Display',Georgia,serif;font-size:16px;font-weight:700;color:var(--accent);}
.logo-sub{color:var(--muted);font-size:10px;font-weight:500;display:none;}
@media(min-width:500px){.logo-sub{display:inline;}}
.header-logout{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--muted);font-size:10px;cursor:pointer;}
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:9px;font-weight:500;transition:color 0.2s;}
.nav-btn.active{color:var(--accent);}
.nav-btn .nav-icon{font-size:18px;line-height:1;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.pad{padding:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.card-accent{border-top:3px solid var(--accent);}
.section-title{font-family:'DM Serif Display',Georgia,serif;font-size:20px;margin:0 0 4px;}
.section-sub{color:var(--muted);font-size:12px;margin:0 0 16px;}
.label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
.badge-green{background:rgba(74,222,128,0.15);color:var(--green);}
.badge-yellow{background:rgba(251,191,36,0.15);color:var(--yellow);}
.badge-red{background:rgba(248,113,113,0.15);color:var(--red);}
.badge-blue{background:rgba(96,165,250,0.15);color:var(--blue);}
.badge-purple{background:rgba(192,132,252,0.15);color:var(--purple);}
.badge-accent{background:var(--accent-glow);color:var(--accent);}
.btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer;transition:opacity 0.2s;}
.btn:hover{opacity:0.9;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;}
.btn-outline.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);outline:none;font-size:14px;}
.input:focus{border-color:var(--accent);}
select.input{appearance:auto;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.stat-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;}
.stat-value{font-family:'DM Serif Display',Georgia,serif;font-size:24px;font-weight:700;color:var(--text);margin:2px 0;}
.stat-sub{color:var(--muted);font-size:11px;}
.student-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s;}
.student-card:hover{border-color:var(--accent);}
.student-name{font-family:'DM Serif Display',Georgia,serif;font-size:17px;margin-bottom:2px;}
.student-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:11px;}
.student-detail{display:flex;align-items:center;gap:4px;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.attendance-grid{display:grid;grid-template-columns:120px repeat(7,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;font-size:12px;}
.attendance-cell{background:var(--surface);padding:8px 6px;text-align:center;display:flex;align-items:center;justify-content:center;}
.attendance-header{background:var(--surface2);font-weight:600;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.3px;}
.attendance-name{justify-content:flex-start;font-weight:600;font-size:12px;}
.attendance-toggle{cursor:pointer;font-size:16px;transition:opacity 0.2s;}
.attendance-toggle:hover{opacity:0.8;}
.payment-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);}
.payment-row:last-child{border-bottom:none;}
.payment-amount{font-family:'DM Serif Display',Georgia,serif;font-size:16px;font-weight:700;}
.payment-positive{color:var(--green);}
.payment-negative{color:var(--red);}
.ensemble-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.ensemble-name{font-family:'DM Serif Display',Georgia,serif;font-size:17px;margin-bottom:4px;}
.repertoire-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.repertoire-item:last-child{border-bottom:none;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600;margin-bottom:4px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.revenue-bar{display:flex;align-items:flex-end;gap:4px;height:80px;margin:12px 0;}
.revenue-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.revenue-fill{width:100%;border-radius:4px 4px 0 0;background:var(--accent);transition:height 0.3s;}
.revenue-label{font-size:9px;color:var(--muted);}
.revenue-amount{font-size:9px;font-weight:700;color:var(--accent);}
@media(min-width:700px){
  .stats{grid-template-columns:repeat(4,1fr);}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
}
@media(max-width:600px){
  .attendance-grid{grid-template-columns:80px repeat(7,1fr);font-size:10px;}
  .attendance-cell{padding:6px 3px;}
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

<script>
/* ===== AUTH ===== */
let adminUser = null;

async function checkAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw = document.getElementById('auth-pw').value;
  if (!email || !pw) { document.getElementById('auth-err').style.display = 'block'; return; }
  try {
    const cred = await firebase.auth().signInWithEmailAndPassword(email, pw);
    adminUser = cred.user;
    showApp();
  } catch (e) {
    console.error('Auth failed:', e);
    document.getElementById('auth-err').style.display = 'block';
  }
}

async function resetPassword() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email) { alert('Please enter your email address first.'); return; }
  try {
    await firebase.auth().sendPasswordResetEmail(email);
    document.getElementById('auth-reset-msg').style.display = 'block';
    document.getElementById('auth-err').style.display = 'none';
  } catch (e) {
    alert('Could not send reset email: ' + e.message);
  }
}

async function showApp() {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadLocalData();
  setupRealtimeSync();
  render();
}

function logout() {
  firebase.auth().signOut();
  adminUser = null;
  document.getElementById('auth-gate').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-pw').value = '';
  document.getElementById('auth-err').style.display = 'none';
}

/* ===== FIREBASE SETUP ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBAVSC2g5xfnUXqkBoBX8TspITgDg_4FMo",
  authDomain: "professor-of-funk.firebaseapp.com",
  databaseURL: "https://professor-of-funk-default-rtdb.firebaseio.com",
  projectId: "professor-of-funk",
  storageBucket: "professor-of-funk.firebasestorage.app",
  messagingSenderId: "409198973109",
  appId: "1:409198973109:web:1c2aa4fd4611130b236efc"
};
const fbApp = firebase.initializeApp(firebaseConfig);
const fbDb = firebase.database();
const DB_ROOT = "professorOfFunk";

// Secondary app for creating student auth accounts without signing out admin
const secondaryApp = firebase.initializeApp(firebaseConfig, 'secondary');

async function createStudentAuth(studentId, accessCode) {
  try {
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(
      studentId + '@professoroffunk.app',
      accessCode + '!PoF'
    );
    await secondaryApp.auth().signOut();
    return cred.user.uid;
  } catch (e) {
    if (e.code === 'auth/email-already-in-use') {
      console.warn('Student auth account already exists for', studentId);
      try {
        const cred = await secondaryApp.auth().signInWithEmailAndPassword(
          studentId + '@professoroffunk.app',
          accessCode + '!PoF'
        );
        const uid = cred.user.uid;
        await secondaryApp.auth().signOut();
        return uid;
      } catch (e2) {
        console.error('Could not retrieve existing student UID:', e2);
        return null;
      }
    }
    console.error('Failed to create student auth:', e);
    return null;
  }
}

async function createParentAuth(parentId, accessCode) {
  try {
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(
      parentId + '@parent.professoroffunk.app',
      accessCode + '!PoF'
    );
    await secondaryApp.auth().signOut();
    return cred.user.uid;
  } catch (e) {
    if (e.code === 'auth/email-already-in-use') {
      console.warn('Parent auth account already exists for', parentId);
      try {
        const cred = await secondaryApp.auth().signInWithEmailAndPassword(
          parentId + '@parent.professoroffunk.app',
          accessCode + '!PoF'
        );
        const uid = cred.user.uid;
        await secondaryApp.auth().signOut();
        return uid;
      } catch (e2) {
        console.error('Could not retrieve existing parent UID:', e2);
        return null;
      }
    }
    console.error('Failed to create parent auth:', e);
    return null;
  }
}

async function ensureParentRecord(studentKey, parentName, parentEmail, parentAccessCode) {
  const parentId = parentAccessCode.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/^-|-$/g, '');
  if (!localData.parents) localData.parents = {};
  let parent = localData.parents[parentId];
  let authUid;
  if (!parent) {
    authUid = await createParentAuth(parentId, parentAccessCode);
    parent = {
      profile: { name: parentName, email: parentEmail, accessCode: parentAccessCode, authUid: authUid || null },
      children: {}
    };
  } else {
    authUid = parent.profile.authUid;
  }
  parent.children[studentKey] = true;
  localData.parents[parentId] = parent;
  await fbSave("parents/" + parentId, parent);
  await fbSave("meta/parentAccessCodes/" + parentAccessCode, parentId);
  return authUid;
}

// Auto-login only if session belongs to the admin account
const ADMIN_UID = 'FRLOpQbA69dhh7pCvx45fdPfkbz1';
firebase.auth().onAuthStateChanged(user => {
  if (user && !adminUser) {
    if (user.uid === ADMIN_UID) {
      adminUser = user;
      showApp();
    } else {
      // Wrong account (e.g. student session) — sign out and show login
      firebase.auth().signOut();
    }
  }
});
function dbRef(path) { return fbDb.ref(DB_ROOT + "/" + path); }
let skipSync = false;

function toArray(val) {
  if (Array.isArray(val)) return val;
  if (val && typeof val === 'object') return Object.values(val);
  return [];
}

async function fbLoad(key, fallback) {
  try {
    const snap = await dbRef(key).once("value");
    const val = snap.val();
    return val !== null ? val : fallback;
  } catch(e) {
    console.warn("Firebase read failed for " + key, e);
    return fallback;
  }
}

async function fbSave(key, val) {
  try { await dbRef(key).set(val); } catch(e) { console.warn("Firebase write failed for " + key, e); }
}

function localToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function onDataChange(key, callback) {
  const ref = dbRef(key);
  ref.on("value", snap => { const val = snap.val(); if (val !== null && !skipSync) callback(val); });
  return () => ref.off("value");
}

/* ===== DATA LAYER ===== */
let localData = null;

async function loadLocalData() {
  const [students, ensembles, lessonTranscripts, parents] = await Promise.all([
    fbLoad("students", {}),
    fbLoad("ensembles", {}),
    fbLoad("lessonTranscripts", []),
    fbLoad("parents", {})
  ]);
  // Normalize new schema: programs, payments, attendance are objects
  Object.keys(students).forEach(k => {
    if (!students[k].programs || typeof students[k].programs !== 'object') students[k].programs = {};
    if (!students[k].payments || typeof students[k].payments !== 'object') students[k].payments = {};
    if (!students[k].attendance || typeof students[k].attendance !== 'object') students[k].attendance = {};
  });
  Object.keys(ensembles).forEach(k => {
    ensembles[k].repertoire = toArray(ensembles[k].repertoire);
    ensembles[k].assignments = toArray(ensembles[k].assignments);
    if (ensembles[k].info) ensembles[k].info.members = toArray(ensembles[k].info.members);
  });
  localData = { students, ensembles, lessonTranscripts: toArray(lessonTranscripts), parents };
}

function saveLocalData(paths) {
  if (!localData) return;
  // Safety: never overwrite students with empty data
  if (!paths || paths.includes('students')) {
    if (!localData.students || Object.keys(localData.students).length === 0) {
      console.error('SAFETY: Refusing to save empty students data — aborting save');
      return;
    }
  }
  skipSync = true;
  // If specific paths given, only write those; otherwise write all
  const all = !paths;
  if (all || paths.includes('students')) fbSave("students", localData.students);
  if (all || paths.includes('ensembles')) fbSave("ensembles", localData.ensembles);
  if (all || paths.includes('lessonTranscripts')) fbSave("lessonTranscripts", localData.lessonTranscripts || []);
  if (all || paths.includes('parents')) fbSave("parents", localData.parents || {});
  setTimeout(() => { skipSync = false; }, 500);
}

function setupRealtimeSync() {
  onDataChange("students", val => {
    if (!localData) return;
    Object.keys(val).forEach(k => {
      if (!val[k].programs || typeof val[k].programs !== 'object') val[k].programs = {};
      if (!val[k].payments || typeof val[k].payments !== 'object') val[k].payments = {};
      if (!val[k].attendance || typeof val[k].attendance !== 'object') val[k].attendance = {};
    });
    localData.students = val;
    render();
  });
  onDataChange("ensembles", val => {
    if (!localData) return;
    Object.keys(val).forEach(k => {
      val[k].repertoire = toArray(val[k].repertoire);
      val[k].assignments = toArray(val[k].assignments);
      if (val[k].info) val[k].info.members = toArray(val[k].info.members);
    });
    localData.ensembles = val;
    render();
  });
  onDataChange("lessonTranscripts", val => {
    if (!localData) return;
    localData.lessonTranscripts = toArray(val);
    render();
  });
}

let paymentStudent = null;

/* ===== GMAIL INTEGRATION =====
 * To activate Gmail draft creation:
 * 1. Go to https://console.cloud.google.com/apis/credentials?project=professor-of-funk
 * 2. Enable the Gmail API at https://console.cloud.google.com/apis/library/gmail.googleapis.com?project=professor-of-funk
 * 3. Create an OAuth Client ID (Web application type)
 *    - Authorized JavaScript origins: https://professoroffunk.com, https://professor-of-funk.web.app, http://localhost:5000
 * 4. Configure OAuth consent screen: add scope https://www.googleapis.com/auth/gmail.compose
 * 5. Replace 'YOUR_CLIENT_ID_HERE' below with the Client ID (looks like 409198973109-xxxx.apps.googleusercontent.com)
 */
let gmailAccessToken = null;
const GMAIL_CLIENT_ID = '409198973109-e2od2hm2qk631nkd59uvsknsajku3715.apps.googleusercontent.com';
const GMAIL_SCOPES = 'https://www.googleapis.com/auth/gmail.compose';

function connectGmail() {
  if (GMAIL_CLIENT_ID === 'YOUR_CLIENT_ID_HERE') {
    alert('Gmail integration is not configured yet.\n\nTo activate it, Simon needs to:\n1. Create an OAuth Client ID in Google Cloud Console\n2. Replace YOUR_CLIENT_ID_HERE in admin.html\n\nSee the comments in the source code for full instructions.');
    return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GMAIL_CLIENT_ID,
    scope: GMAIL_SCOPES,
    callback: (response) => {
      if (response.access_token) {
        gmailAccessToken = response.access_token;
        render();
      }
    },
  });
  client.requestAccessToken();
}

async function createGmailDraft(to, subject, htmlBody) {
  const email = [
    'Content-Type: text/html; charset="UTF-8"',
    'MIME-Version: 1.0',
    'To: ' + to,
    'Subject: ' + subject,
    '',
    htmlBody
  ].join('\r\n');

  const raw = btoa(unescape(encodeURIComponent(email)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

  const resp = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/drafts', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + gmailAccessToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message: { raw } })
  });

  if (!resp.ok) {
    const err = await resp.json();
    throw new Error(err.error?.message || 'Gmail API error');
  }
  return resp.json();
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'class' || k === 'className') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat(9).forEach(c => { if (c == null || c === false) return; el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return el;
}

/* ===== BILLING COMPUTATION (new schema) ===== */
function computeStudentBilling(studentKey) {
  const s = localData.students[studentKey];
  if (!s) return { totalTuition: 0, totalPaid: 0, tuitionOwed: 0, invoiceStatus: 'Paid', totalClasses: 0, perProgram: {} };
  let totalTuition = 0, totalClasses = 0;
  const perProgram = {};
  Object.entries(s.programs || {}).forEach(([pid, prog]) => {
    const attendanceRecords = Object.values((s.attendance || {})[pid] || {})
      .filter(a => a.present);
    const attended = attendanceRecords.length;
    totalClasses += attended;
    // Use rateSnapshot from each attendance record when available, fall back to program rate
    const tuition = attendanceRecords.reduce((sum, a) => sum + (a.rateSnapshot || prog.rate || 0), 0);
    totalTuition += tuition;
    perProgram[pid] = { attended, tuition, rate: prog.rate, name: prog.name };
  });
  // Only count confirmed payments (status: "confirmed" or no status for legacy records)
  const totalPaid = Object.values(s.payments || {})
    .filter(p => !p.status || p.status === 'confirmed')
    .reduce((sum, p) => sum + (p.amount || 0), 0);
  const tuitionOwed = totalTuition - totalPaid;
  const invoiceStatus = tuitionOwed > 0 ? 'Unpaid' : tuitionOwed < 0 ? 'Overpaid' : 'Paid';
  return { totalTuition, totalPaid, tuitionOwed, invoiceStatus, totalClasses, perProgram };
}

function computeMonthlyBilling(studentKey, year, month) {
  const s = localData.students[studentKey];
  if (!s) return { programs: [], totalThisMonth: 0, paymentsThisMonth: 0, previousBalance: 0, balanceDue: 0 };

  // Classes attended this month per program
  const programs = [];
  let totalThisMonth = 0;
  Object.entries(s.programs || {}).forEach(([pid, prog]) => {
    const attendance = (s.attendance || {})[pid] || {};
    let classesThisMonth = 0;
    Object.entries(attendance).forEach(([dateStr, a]) => {
      if (!a.present) return;
      const d = new Date(dateStr + 'T12:00:00');
      if (d.getFullYear() === year && d.getMonth() === month) classesThisMonth++;
    });
    if (classesThisMonth > 0) {
      const subtotal = classesThisMonth * (prog.rate || 0);
      totalThisMonth += subtotal;
      programs.push({ name: prog.name, classesThisMonth, rate: prog.rate || 0, subtotal });
    }
  });

  // Payments this month (confirmed only)
  let paymentsThisMonth = 0;
  Object.values(s.payments || {}).forEach(p => {
    if (p.status && p.status !== 'confirmed') return;
    const d = new Date((p.date || '') + 'T12:00:00');
    if (d.getFullYear() === year && d.getMonth() === month) paymentsThisMonth += (p.amount || 0);
  });

  // All-time balance for "previous balance" context
  const allTime = computeStudentBilling(studentKey);
  const balanceDue = allTime.tuitionOwed;
  const previousBalance = balanceDue - totalThisMonth + paymentsThisMonth;

  return { programs, totalThisMonth, paymentsThisMonth, previousBalance, balanceDue };
}

/* ===== OUTSTANDING BILLING =====
 * Computes unpaid classes by using total payments as credit against
 * the oldest classes first. Classes not covered by credit are unpaid.
 */
function computeOutstandingBilling(studentKey) {
  const s = localData.students[studentKey];
  if (!s) return { classes: [], totalCharges: 0, balanceDue: 0, periodLabel: '' };

  // Gather all attended classes with dates
  const allClasses = [];
  Object.entries(s.programs || {}).forEach(([pid, prog]) => {
    const attendance = (s.attendance || {})[pid] || {};
    Object.entries(attendance).forEach(([dateStr, a]) => {
      if (!a.present) return;
      const rate = a.rateSnapshot || prog.rate || 0;
      allClasses.push({ date: dateStr, programName: prog.name, rate });
    });
  });

  // Sort oldest first
  allClasses.sort((a, b) => a.date.localeCompare(b.date));

  // Total payments as credit — confirmed only (matches computeStudentBilling)
  let credit = Object.values(s.payments || {})
    .filter(p => !p.status || p.status === 'confirmed')
    .reduce((sum, p) => sum + (p.amount || 0), 0);

  // Consume credit against oldest classes first; remainder = unpaid
  const unpaidClasses = [];
  for (const cls of allClasses) {
    if (credit >= cls.rate) {
      credit -= cls.rate;
    } else {
      unpaidClasses.push(cls);
      credit = 0;
    }
  }

  // Authoritative balance from existing billing logic
  const balanceDue = computeStudentBilling(studentKey).tuitionOwed;
  const totalCharges = unpaidClasses.reduce((sum, c) => sum + c.rate, 0);

  // Derive period label from unpaid class date range
  let periodLabel = '';
  if (unpaidClasses.length > 0) {
    const first = new Date(unpaidClasses[0].date + 'T12:00:00');
    const last = new Date(unpaidClasses[unpaidClasses.length - 1].date + 'T12:00:00');
    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const fmtYear = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    if (first.getTime() === last.getTime()) {
      periodLabel = fmtYear(first);
    } else if (first.getFullYear() === last.getFullYear()) {
      periodLabel = fmt(first) + ' - ' + fmtYear(last);
    } else {
      periodLabel = fmtYear(first) + ' - ' + fmtYear(last);
    }
  }

  return { classes: unpaidClasses, totalCharges, balanceDue, periodLabel };
}

/* ===== FAMILY BILLING =====
 * Groups students by parentEmail and computes combined outstanding billing.
 * Returns one entry per family, with per-child breakdowns.
 */
function groupStudentsByParent(studentKeys) {
  const families = {};
  const students = localData.students;
  for (const key of studentKeys) {
    const s = students[key];
    if (!s) continue;
    // Normalize: use first email if comma-separated
    const rawEmail = (s.profile.parentEmail || '').trim();
    const email = rawEmail.split(',')[0].trim().toLowerCase();
    if (!email) continue;
    if (!families[email]) {
      families[email] = {
        parentEmail: rawEmail,
        parentName: s.profile.parentName || '',
        studentKeys: []
      };
    }
    families[email].studentKeys.push(key);
  }
  return families;
}

function computeFamilyBilling(studentKeys, year, month) {
  const children = [];
  let totalCharges = 0;
  let totalPreviousBalance = 0;
  let balanceDue = 0;
  let totalPaymentsThisMonth = 0;

  for (const key of studentKeys) {
    const s = localData.students[key];
    if (!s) continue;
    const mb = computeMonthlyBilling(key, year, month);

    // Gather individual class dates for this month (for invoice line items)
    const monthClasses = [];
    Object.entries(s.programs || {}).forEach(([pid, prog]) => {
      const attendance = (s.attendance || {})[pid] || {};
      Object.entries(attendance).forEach(([dateStr, a]) => {
        if (!a.present) return;
        const d = new Date(dateStr + 'T12:00:00');
        if (d.getFullYear() === year && d.getMonth() === month) {
          monthClasses.push({ date: dateStr, programName: prog.name, rate: a.rateSnapshot || prog.rate || 0 });
        }
      });
    });
    monthClasses.sort((a, b) => a.date.localeCompare(b.date));

    children.push({
      name: s.profile.name,
      key,
      classes: monthClasses.map(c => ({ ...c, studentName: s.profile.name })),
      totalCharges: mb.totalThisMonth,
      paymentsThisMonth: mb.paymentsThisMonth,
      previousBalance: mb.previousBalance,
      balanceDue: mb.balanceDue,
    });
    totalCharges += mb.totalThisMonth;
    totalPreviousBalance += mb.previousBalance;
    totalPaymentsThisMonth += mb.paymentsThisMonth;
    balanceDue += mb.balanceDue;
  }

  // Period label for the selected month
  const monthDate = new Date(year, month, 1);
  const periodLabel = monthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  return { children, totalCharges, totalPreviousBalance, totalPaymentsThisMonth, balanceDue, periodLabel };
}

function getAttendanceRate(studentKey) {
  const s = localData.students[studentKey];
  if (!s) return 100;
  let attended = 0, total = 0;
  Object.entries(s.attendance || {}).forEach(([pid, dates]) => {
    Object.values(dates).forEach(a => {
      total++;
      if (a.present) attended++;
    });
  });
  return total ? Math.round(attended / total * 100) : 100;
}

/* ===== ENSEMBLE MEMBERSHIP SYNC ===== */
function syncEnsembleMembership(studentName, oldEnsembleId, newEnsembleId) {
  // Remove student from old ensemble's member list
  if (oldEnsembleId && localData.ensembles[oldEnsembleId]) {
    const members = localData.ensembles[oldEnsembleId].info.members || [];
    const idx = members.indexOf(studentName);
    if (idx !== -1) members.splice(idx, 1);
    localData.ensembles[oldEnsembleId].info.members = members;
  }
  // Add student to new ensemble's member list
  if (newEnsembleId && localData.ensembles[newEnsembleId]) {
    const members = localData.ensembles[newEnsembleId].info.members || [];
    if (!members.includes(studentName)) members.push(studentName);
    localData.ensembles[newEnsembleId].info.members = members;
  }
}

function getEnsembleForStudent(studentKey) {
  const s = localData.students[studentKey];
  if (!s || !s.programs) return null;
  const ensProg = Object.values(s.programs).find(pr => pr.type === 'ensemble' && pr.ensembleId);
  if (!ensProg) return null;
  return localData.ensembles[ensProg.ensembleId] || null;
}

      )

    h('button', { class: 'btn', style: { marginTop: '4px' }, onClick: async () => {
      const name = document.getElementById('new-student-name').value.trim();
      const instrument = document.getElementById('new-student-instrument').value;
      const ageGrade = document.getElementById('new-student-agegrade').value.trim();
      const skillLevel = document.getElementById('new-student-skill').value;
      const allergies = document.getElementById('new-student-allergies').value.trim();
      const phone = document.getElementById('new-student-phone').value.trim();
      const emergencyContact = document.getElementById('new-student-emergency').value.trim();
      const parentName = document.getElementById('new-student-parent').value.trim();
      const parentEmail = document.getElementById('new-student-email').value.trim();
      const accessCode = document.getElementById('new-student-code').value.trim().toLowerCase();
      const parentCodeRaw = document.getElementById('new-student-parent-code').value.trim().toLowerCase();
      if (!name) { alert('Please enter a student name.'); return; }
      if (!accessCode) { alert('Please enter an access code.'); return; }
      const existingCodes = Object.values(localData.students).map(s => s.profile.accessCode);
      if (existingCodes.includes(accessCode)) { alert('That access code is already in use.'); return; }
      const key = name.toLowerCase().replace(/[^a-z0-9]/g, '');
      const parentCode = parentCodeRaw || (key + '-parent');
      if (localData.students[key]) { alert('A student with that key already exists.'); return; }

      // Build programs from selected buttons
      const programs = {};
      document.querySelectorAll('.new-prog-btn.active').forEach(btn => {
        const pid = btn.getAttribute('data-pid');
        const type = btn.getAttribute('data-type');

          programs.private = { type: 'private', name: 'Private Lessons', ensembleId: null, rate, lessonDay: day, lessonTime: time };
        } else {
          const ens = localData.ensembles[pid];
          programs[pid] = { type: 'ensemble', name: ens ? ens.info.name : pid, ensembleId: pid, rate: 62.50, lessonDay: null, lessonTime: null };
          // Add to ensemble member list
          if (ens) {
            if (!ens.info.members.includes(name)) { ens.info.members.push(name); fbSave("ensembles/" + pid + "/info/members", ens.info.members); }
          }
        }
      });

      const authUid = await createStudentAuth(key, accessCode);

      localData.students[key] = {
        profile: { name, instrument, startDate: localToday(), accessCode, authUid: authUid || null, parentName, parentEmail, parentAuthUid: null, parentAccessCode: null, ageGrade, skillLevel, allergies, phone, emergencyContact, active: true },
        programs,
        attendance: {},
        payments: {},
        lessons: {},
        practice: {},
        milestones: {},
        resources: {}
      };

      await fbSave("students/" + key, localData.students[key]);
      await fbSave("meta/accessCodes/" + accessCode, key);

      if (parentName) {
        const parentAuthUid = await ensureParentRecord(key, parentName, parentEmail, parentCode);
        localData.students[key].profile.parentAuthUid = parentAuthUid || null;
        localData.students[key].profile.parentAccessCode = parentCode;
        await fbSave("students/" + key + "/profile/parentAuthUid", parentAuthUid || null);
        await fbSave("students/" + key + "/profile/parentAccessCode", parentCode);
      }

      showAddStudent = false;
      render();
    }}, 'Add Student')
  );
}

        h('input', { class: 'input', id: 'edit-student-email', type: 'email', value: p.parentEmail || '' })
      )
    ),
    h('div', { class: 'form-row' },
      h('div', { class: 'form-group' },
        h('label', {}, 'Access Code (student login)'),
        h('input', { class: 'input', id: 'edit-student-code', value: p.accessCode || '' })
      ),
      h('div', { class: 'form-group' },
        h('label', {}, 'Parent Access Code'),
        h('input', { class: 'input', id: 'edit-student-parent-code', value: p.parentAccessCode || '' })
      )
    ),
    h('div', { style: { display: 'flex', gap: '8px', marginTop: '4px' } },
      h('button', { class: 'btn', onClick: async () => {
        const name = document.getElementById('edit-student-name').value.trim();
        const instrument = document.getElementById('edit-student-instrument').value;
        const ageGrade = document.getElementById('edit-student-agegrade').value.trim();
        const skillLevel = document.getElementById('edit-student-skill').value;
        const allergies = document.getElementById('edit-student-allergies').value.trim();
        const phone = document.getElementById('edit-student-phone').value.trim();
        const emergencyContact = document.getElementById('edit-student-emergency').value.trim();
        const active = document.getElementById('edit-student-active').value === 'true';
        const parentName = document.getElementById('edit-student-parent').value.trim();
        const parentEmail = document.getElementById('edit-student-email').value.trim();
        const accessCode = document.getElementById('edit-student-code').value.trim().toLowerCase();
        const parentCode = document.getElementById('edit-student-parent-code').value.trim().toLowerCase();
        if (!name) { alert('Student name is required.'); return; }
        if (!accessCode) { alert('Access code is required.'); return; }
        // Check duplicate access code (excluding self)
        const existingCodes = Object.entries(localData.students).filter(([k]) => k !== key).map(([,v]) => v.profile.accessCode);
        if (existingCodes.includes(accessCode)) { alert('That access code is already in use by another student.'); return; }
        // Update access code mapping if changed
        const oldCode = s.profile.accessCode;
        if (oldCode !== accessCode) {
          await dbRef("meta/accessCodes/" + oldCode).remove();
          await fbSave("meta/accessCodes/" + accessCode, key);
        }
        // Build new programs from JS toggle state (not DOM — survives re-renders)
        const newPrograms = {};
        const oldPrograms = s.programs || {};
        Object.keys(editStudentPrograms).forEach(pid => {
          if (pid === '_key' || !editStudentPrograms[pid]) return;
          if (pid === 'private') {
            const rate = parseFloat(document.getElementById('edit-student-private-rate').value) || 125;
            const day = document.getElementById('edit-student-day').value || null;
            const time = document.getElementById('edit-student-time').value.trim() || null;
            newPrograms.private = { type: 'private', name: 'Private Lessons', ensembleId: null, rate, lessonDay: day, lessonTime: time };
          } else {
            const ens = localData.ensembles[pid];
            const existingRate = oldPrograms[pid] ? oldPrograms[pid].rate : 62.50;
            newPrograms[pid] = { type: 'ensemble', name: ens ? ens.info.name : pid, ensembleId: pid, rate: existingRate, lessonDay: null, lessonTime: null };
          }
        });
        // Safety: warn if about to wipe all programs from a student that had them
        if (Object.keys(newPrograms).length === 0 && Object.keys(oldPrograms).length > 0) {
          if (!confirm('This will remove ALL programs from ' + p.name + '. Are you sure?')) return;
        }
        // Sync ensemble memberships (remove from old, add to new)
        const oldName = p.name;
        Object.keys(oldPrograms).forEach(pid => {
          if (pid !== 'private' && !newPrograms[pid]) {
            syncEnsembleMembership(oldName, pid, null);
          }
        });
        Object.keys(newPrograms).forEach(pid => {
          if (pid !== 'private') {
            if (!oldPrograms[pid] || oldName !== name) {
              if (oldPrograms[pid] && oldName !== name) syncEnsembleMembership(oldName, pid, null);
              syncEnsembleMembership(name, null, pid);
            }
          }
        });
        // Save ensemble membership changes
        Object.keys({ ...oldPrograms, ...newPrograms }).forEach(pid => {
          if (pid !== 'private' && localData.ensembles[pid]) {
            fbSave("ensembles/" + pid + "/info/members", localData.ensembles[pid].info.members);
          }
        });
        // Create/update parent record if parent name and code are provided
        let parentAuthUid = s.profile.parentAuthUid || null;
        if (parentName && parentCode) {
          parentAuthUid = await ensureParentRecord(key, parentName, parentEmail, parentCode) || null;
        }
        // Update profile (only profile fields, no old schema fields)
        s.profile = { ...s.profile, name, instrument, ageGrade, skillLevel, allergies, phone, emergencyContact, active, parentName, parentEmail, accessCode, parentAccessCode: parentCode || s.profile.parentAccessCode || null, parentAuthUid };
        s.programs = newPrograms;
        // Write to Firebase via targeted saves
        await fbSave("students/" + key + "/profile", s.profile);
        await fbSave("students/" + key + "/programs", newPrograms);
        editingStudent = null;
        editStudentPrograms = {};
        render();
      }}, 'Save Changes'),
      h('button', { class: 'btn-outline', style: { color: 'var(--red)', borderColor: 'var(--red)' }, onClick: async () => {
        if (!confirm('Delete ' + p.name + '? This removes all their data. This cannot be undone.')) return;
        // Remove from all ensemble member lists
        Object.keys(s.programs || {}).forEach(pid => {
          if (pid !== 'private') {
            syncEnsembleMembership(p.name, pid, null);
            if (localData.ensembles[pid]) fbSave("ensembles/" + pid + "/info/members", localData.ensembles[pid].info.members);
          }
        });
        const code = s.profile.accessCode;
        if (code) await dbRef("meta/accessCodes/" + code).remove();
        if (s.profile.parentAccessCode) await dbRef("meta/parentAccessCodes/" + s.profile.parentAccessCode).remove();
        await dbRef("students/" + key).remove();
        delete localData.students[key];
        editingStudent = null;
        editStudentPrograms = {};
        render();
      }}, 'Delete Student')
    )
  );
}

function renderStudentsSection() {
  const students = localData.students;
  const keys = Object.keys(students).filter(k => students[k].profile.active !== false);
  const inactiveKeys = Object.keys(students).filter(k => students[k].profile.active === false);
  const totalStudents = keys.length;
  const now = new Date();
  const totalRevenue = keys.reduce((sum, k) => {
    return sum + Object.values(students[k].payments || {}).filter(p => {
      const d = new Date(p.date + 'T12:00:00');
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).reduce((s, p) => s + (p.amount || 0), 0);
  }, 0);
  const outstanding = keys.reduce((sum, k) => sum + Math.max(0, computeStudentBilling(k).tuitionOwed), 0);

  return h('div', {},
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } },
      h('h2', { class: 'section-title' }, 'Students'),
      !showAddStudent ? h('button', { class: 'btn btn-sm', onClick: () => { showAddStudent = true; render(); } }, '+ Add Student') : ''
    ),
    h('p', { class: 'section-sub' }, totalStudents + ' active students' + (inactiveKeys.length ? ', ' + inactiveKeys.length + ' inactive' : '')),

    showAddStudent ? renderAddStudentForm() : '',

    h('div', { class: 'stats' },
      h('div', { class: 'stat' }, h('div', { class: 'stat-label' }, 'Students'), h('div', { class: 'stat-value' }, '' + totalStudents)),
      h('div', { class: 'stat' }, h('div', { class: 'stat-label' }, 'This Month'), h('div', { class: 'stat-value' }, fmtCurrency(totalRevenue))),
      h('div', { class: 'stat' }, h('div', { class: 'stat-label' }, 'Outstanding'), h('div', { class: 'stat-value', style: { color: outstanding > 0 ? 'var(--red)' : 'var(--green)' } }, fmtCurrency(outstanding))),
      h('div', { class: 'stat' }, h('div', { class: 'stat-label' }, 'Total Tuition'), h('div', { class: 'stat-value' }, fmtCurrency(keys.reduce((s, k) => s + computeStudentBilling(k).totalTuition, 0))))
    ),

    ...keys.map(key => {
      if (editingStudent === key) return renderEditStudentForm(key);
      const s = students[key];
      const billing = computeStudentBilling(key);
      const attRate = getAttendanceRate(key);
      const programNames = getStudentProgramNames(key);
      return h('div', { class: 'student-card', onClick: () => { editingStudent = key; render(); } },
        h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' } },
          h('div', {},
            h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
              h('div', { class: 'status-dot', style: { background: getStatusColor(billing.invoiceStatus) } }),
              h('div', { class: 'student-name' }, s.profile.name)
            ),
            h('div', { class: 'student-meta' },
              h('span', { class: 'student-detail' }, s.profile.instrument),
              programNames ? h('span', { class: 'student-detail' }, programNames) : '',
              s.profile.parentName ? h('span', { class: 'student-detail' }, s.profile.parentName) : ''
            )
          ),
          h('span', { class: 'badge ' + getStatusBadge(billing.invoiceStatus) }, billing.invoiceStatus)
        ),
        h('div', { style: { display: 'flex', gap: '16px', marginTop: '10px', fontSize: '11px', color: 'var(--muted)' } },
          h('span', {}, billing.totalClasses + ' classes'),
          h('span', {}, 'Attendance: ' + attRate + '%'),
          billing.tuitionOwed > 0 ? h('span', { style: { color: 'var(--red)', fontWeight: '600' } }, 'Owes: ' + fmtCurrency(billing.tuitionOwed))
            : billing.tuitionOwed < 0 ? h('span', { style: { color: 'var(--blue)', fontWeight: '600' } }, 'Credit: ' + fmtCurrency(billing.tuitionOwed))
            : h('span', { style: { color: 'var(--green)' } }, 'Paid up')

function renderAttendance() {
  const students = localData.students;
  const allKeys = Object.keys(students).filter(k => students[k].profile.active !== false);

  // Build list of all programs across all students
  const programSet = {};
  allKeys.forEach(k => {
    Object.entries(students[k].programs || {}).forEach(([pid, prog]) => {
      if (!programSet[pid]) programSet[pid] = prog.name;
    });
  });
  const programIds = Object.keys(programSet);

  // Auto-select first program if none selected
  if (!attendanceProgram && programIds.length > 0) attendanceProgram = programIds[0];

  const isAllView = attendanceProgram === '__all__';

  // Filter students enrolled in selected program
  const filteredKeys = isAllView ? allKeys : allKeys.filter(k => (students[k].programs || {})[attendanceProgram]);

  // Get dates for this program's attendance (last 8 unique dates across all students)
  const dateSet = new Set();
  filteredKeys.forEach(k => {
    if (isAllView) {
      Object.values(students[k].attendance || {}).forEach(progAtt => {
        Object.keys(progAtt).forEach(d => dateSet.add(d));
      });
    } else {
      Object.keys((students[k].attendance || {})[attendanceProgram] || {}).forEach(d => dateSet.add(d));
    }
  });
  customAttendanceDates.forEach(d => dateSet.add(d));
  const allDates = Array.from(dateSet).sort();
  const dates = showAllAttendanceDates ? allDates : allDates.slice(-8);
  const today = localToday();

  return h('div', { class: 'pad' },
    h('h2', { class: 'section-title' }, 'Attendance'),
    h('p', { class: 'section-sub' }, 'Track per-program attendance'),

    // Program filter bar
    h('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap', marginBottom: '16px' } },
      ...programIds.map(pid =>
        h('button', {
          class: 'btn-outline' + (attendanceProgram === pid ? ' active' : ''),
          onClick: () => { attendanceProgram = pid; render(); }
        }, programSet[pid])
      ),
      h('button', {
        class: 'btn-outline' + (isAllView ? ' active' : ''),
        onClick: () => { attendanceProgram = '__all__'; render(); }
      }, 'All')
    ),

    // Mark Today button + Add Date picker (only for non-All view)
    !isAllView ? h('div', { style: { display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap', marginBottom: '12px' } },
      h('button', { class: 'btn btn-sm', onClick: () => {
        filteredKeys.forEach(k => {
          if (!students[k].attendance) students[k].attendance = {};
          if (!students[k].attendance[attendanceProgram]) students[k].attendance[attendanceProgram] = {};
          if (!students[k].attendance[attendanceProgram][today]) {
            students[k].attendance[attendanceProgram][today] = { present: true };
            fbSave("students/" + k + "/attendance/" + attendanceProgram + "/" + today, { present: true });
          }
        });
        render();
      }}, 'Mark All Present Today (' + fmtDate(today) + ')'),
      h('input', { type: 'date', id: 'add-date-input', class: 'input', value: today, style: { width: '150px', padding: '5px 8px', fontSize: '12px' } }),
      h('button', { class: 'btn-outline', style: { padding: '5px 12px', fontSize: '12px' }, onClick: () => {
        const dateInput = document.getElementById('add-date-input');
        if (dateInput && dateInput.value) {
          customAttendanceDates.add(dateInput.value);
          render();
        }
      }}, '+ Add Date'),
      h('button', { class: 'btn-outline' + (showAllAttendanceDates ? ' active' : ''), style: { padding: '5px 12px', fontSize: '12px', marginLeft: 'auto' }, onClick: () => {
        showAllAttendanceDates = !showAllAttendanceDates;
        render();
      }}, showAllAttendanceDates ? 'Last 8' : 'Show All (' + allDates.length + ')')
    ) : '',

    // Attendance grid
    h('div', { style: { overflowX: 'auto', marginBottom: '16px' } },
      h('div', { class: 'attendance-grid', style: { gridTemplateColumns: '120px repeat(' + dates.length + ',1fr)' } },
        // Header row
        h('div', { class: 'attendance-cell attendance-header attendance-name' }, 'Student'),
        ...dates.map(d => h('div', { class: 'attendance-cell attendance-header' }, fmtDate(d))),

        // Student rows
        ...filteredKeys.flatMap(key => {
          const s = students[key];
          return [
            h('div', { class: 'attendance-cell attendance-name' }, s.profile.name),
            ...dates.map(d => {
              if (isAllView) {
                // All view: show aggregate (present in any program)
                let present = false;
                Object.values(s.attendance || {}).forEach(progAtt => {
                  if (progAtt[d] && progAtt[d].present) present = true;
                });
                return h('div', { class: 'attendance-cell', style: { color: present ? 'var(--green)' : 'var(--muted)', fontSize: '16px' } }, present ? '✓' : '—');
              }
              // Per-program view: interactive
              const att = ((s.attendance || {})[attendanceProgram] || {})[d];
              let icon = '—', color = 'var(--muted)';
              if (att) {
                if (att.present) { icon = '✓'; color = 'var(--green)'; }
                else { icon = '✗'; color = 'var(--red)'; }
              }
              return h('div', {
                class: 'attendance-cell attendance-toggle',
                style: { color },
                onClick: () => {
                  if (!s.attendance) s.attendance = {};
                  if (!s.attendance[attendanceProgram]) s.attendance[attendanceProgram] = {};
                  const cur = s.attendance[attendanceProgram][d];
                  if (!cur) {
                    s.attendance[attendanceProgram][d] = { present: true };
                  } else if (cur.present) {
                    s.attendance[attendanceProgram][d] = { present: false };
                  } else {
                    delete s.attendance[attendanceProgram][d];
                  }
                  fbSave("students/" + key + "/attendance/" + attendanceProgram + "/" + d, s.attendance[attendanceProgram][d] || null);
                  render();
                }
              }, icon);
            })
          ];
        })
      )
    ),

    h('div', { class: 'card' },
      h('div', { class: 'label' }, 'Legend'),
      h('div', { style: { display: 'flex', gap: '16px', fontSize: '12px' } },
        h('span', { style: { color: 'var(--green)' } }, '✓ Present'),
        h('span', { style: { color: 'var(--red)' } }, '✗ Absent'),
        h('span', { style: { color: 'var(--muted)' } }, '— No record')
      ),
      !isAllView ? h('p', { style: { color: 'var(--muted)', fontSize: '11px', marginTop: '6px' } }, 'Click to cycle: present → absent → clear') : ''
    ),

    h('div', { class: 'card' },
      h('div', { class: 'label' }, 'Attendance Summary'),
      ...filteredKeys.map(key => {
        const s = students[key];
        let attended = 0, total = 0;
        if (isAllView) {
          Object.values(s.attendance || {}).forEach(progAtt => {
            Object.values(progAtt).forEach(a => { total++; if (a.present) attended++; });
          });
        } else {
          const progAtt = (s.attendance || {})[attendanceProgram] || {};
          Object.values(progAtt).forEach(a => { total++; if (a.present) attended++; });
        }
        const rate = total ? Math.round(attended / total * 100) : 100;
        return h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid var(--border)' } },
          h('span', { style: { fontWeight: '600', fontSize: '13px' } }, s.profile.name),
          h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
            h('span', { style: { fontSize: '11px', color: 'var(--muted)' } }, attended + '/' + total + ' lessons'),
            h('span', { style: { fontSize: '13px', fontWeight: '700', color: rate >= 80 ? 'var(--green)' : rate >= 60 ? 'var(--yellow)' : 'var(--red)' } }, rate + '%')
          )
        );
      })
    )
  );
}

          h('span', {}, fmtCurrency(billing.totalTuition))
        ),
        h('div', { style: { display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: '13px', color: 'var(--green)' } },

        h('div', { class: 'form-row' },
          h('div', { class: 'form-group' },

            h('input', { class: 'input', id: 'pay-amount', type: 'number', value: '' + Math.max(0, billing.tuitionOwed) })
          ),
          h('div', { class: 'form-group' },
            h('label', {}, 'Date'),
            h('input', { class: 'input', id: 'pay-date', type: 'date', value: localToday() })
          )
        ),
        h('div', { class: 'form-row' },
          h('div', { class: 'form-group' },
            h('label', {}, 'Method'),
            h('select', { class: 'input', id: 'pay-method' },
              h('option', { value: 'Venmo' }, 'Venmo'),
              h('option', { value: 'Zelle' }, 'Zelle'),
              h('option', { value: 'Cash' }, 'Cash'),
              h('option', { value: 'Check' }, 'Check'),
              h('option', { value: 'PayPal' }, 'PayPal'),
              h('option', { value: 'Other' }, 'Other')
            )
          ),
          h('div', { class: 'form-group' },

          )
        ),
        h('button', { class: 'btn', onClick: () => {
          const amount = parseFloat(document.getElementById('pay-amount').value);
          const date = document.getElementById('pay-date').value || localToday();
          const method = document.getElementById('pay-method').value;
          const note = document.getElementById('pay-note').value;
          if (!amount || amount <= 0) return;
          const payId = uid();
          if (!s.payments) s.payments = {};
          s.payments[payId] = { date, amount, method, note, programId: null };
          fbSave("students/" + paymentStudent + "/payments/" + payId, s.payments[payId]);
          render();
        }}, 'Record Payment')
      ),

      // Payment history
      h('div', { class: 'card' },
        h('div', { style: { fontWeight: '600', fontSize: '13px', marginBottom: '10px' } }, 'Payment History (' + paymentList.length + ')'),
        ...paymentList.map(entry =>
          h('div', { class: 'payment-row' },
            h('div', { style: { width: '80px' } },
              h('span', { class: 'payment-amount payment-positive' }, '+' + fmtCurrency(entry.amount))
            ),
            h('div', { style: { flex: '1', minWidth: '0' } },
              h('div', { style: { fontSize: '12px' } }, entry.note || 'Payment'),
              h('div', { style: { fontSize: '10px', color: 'var(--muted)' } },
                fmtDateFull(entry.date) + (entry.method ? ' · ' + entry.method : '') + (entry.programId ? ' · ' + entry.programId : ''))
            ),
            h('span', { class: 'badge badge-green' }, 'payment')
          )
        ),
        paymentList.length === 0 ? h('div', { style: { color: 'var(--muted)', fontSize: '12px', padding: '8px 0' } }, 'No payments recorded') : ''
      )
    );
  }

  // Monthly revenue calculation
  const now = new Date();
  const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const revenueByMonth = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const month = d.getMonth();
    const year = d.getFullYear();
    let total = 0;
    keys.forEach(k => {
      Object.values(students[k].payments || {}).forEach(p => {
        const pd = new Date(p.date + 'T12:00:00');
        if (pd.getMonth() === month && pd.getFullYear() === year) total += (p.amount || 0);
      });
    });
    revenueByMonth.push({ label: monthNames[month], amount: total });
  }
  const maxRevenue = Math.max(...revenueByMonth.map(r => r.amount), 1);

  return h('div', { class: 'pad' },
    h('h2', { class: 'section-title' }, 'Payments'),
    h('p', { class: 'section-sub' }, 'Tuition computed from attendance — record payments only'),

    h('div', { class: 'card' },

          h('div', { class: 'revenue-col' },
            h('div', { class: 'revenue-amount' }, r.amount > 0 ? fmtCurrency(r.amount) : ''),
            h('div', { class: 'revenue-fill', style: { height: Math.max(4, (r.amount / maxRevenue) * 60) + 'px' } }),

          )
        )
      )
    ),

    ...keys.map(key => {
      const s = students[key];
      const billing = computeStudentBilling(key);
      const programNames = getStudentProgramNames(key);
      return h('div', { class: 'student-card', onClick: () => { paymentStudent = key; render(); } },
        h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
          h('div', {},
            h('div', { class: 'student-name' }, s.profile.name),
            h('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, programNames + ' · ' + billing.totalClasses + ' classes')
          ),
          h('div', { style: { textAlign: 'right' } },
            h('div', { style: { fontFamily: "'DM Serif Display',Georgia,serif", fontSize: '20px', fontWeight: '700', color: billing.tuitionOwed > 0 ? 'var(--red)' : billing.tuitionOwed < 0 ? 'var(--blue)' : 'var(--green)' } }, (billing.tuitionOwed < 0 ? '-' : '') + fmtCurrency(billing.tuitionOwed)),
            h('span', { class: 'badge ' + getStatusBadge(billing.invoiceStatus) }, billing.invoiceStatus)
          )
        )
      );
    }),

    renderInvoicingSection()
  );
}

      h('button', { class: 'btn-outline', style: { padding: '4px 10px', fontSize: '12px' }, onClick: () => {

    ),

          h('div', {},

          const names = r.names.join(' & ');
          const invoiceData = {
            businessName: 'Professor of Funk',
            businessEmail: 'simonoto@gmail.com',

            paymentsThisMonth: fb.totalPaymentsThisMonth,
            balanceDue: fb.balanceDue,
            periodLabel: fb.periodLabel
          };
          const toEmail = r.parentEmail.split(',')[0].trim();
          try {
            await createGmailDraft(
              toEmail,
              'Professor of Funk - ' + (fb.periodLabel || 'Statement') + ' - ' + names,
              buildInvoiceHtml(invoiceData)
            );
            created++;
          } catch (e) {
            errors.push(names + ': ' + e.message);
            skipped++;

        render();
      }

    invoiceStatus ? h('div', { class: 'card', style: { marginTop: '12px', borderTop: '3px solid var(--green)' } },
      h('div', { style: { fontWeight: '600', fontSize: '13px', color: 'var(--green)' } },

        ...invoiceStatus.errors.map(e => h('div', {}, e))) : ''
    ) : '',

    // Preview modal
    invoicePreviewFamily ? renderFamilyInvoicePreview(invoicePreviewFamily) : ''
  );
}

const SCORE_LABELS = ['', 'Just Started', 'Getting There', 'Solid', 'Performance Ready', 'Mastered'];

function renderSongScores(studentKey) {
  const s = localData.students[studentKey];
  if (!s) return '';
  const scores = s.songScores ? (typeof s.songScores === 'object' && !Array.isArray(s.songScores) ? s.songScores : {}) : {};
  const songList = Object.entries(scores).sort((a, b) => (b[1].lastUpdated || '').localeCompare(a[1].lastUpdated || ''));

  return h('div', { class: 'card', style: { borderTop: '3px solid var(--accent)', marginTop: '16px' } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' } },
      h('div', { style: { fontFamily: "'DM Serif Display',Georgia,serif", fontSize: '16px' } }, 'Song Scores'),
      !addingSongScore ? h('button', { class: 'btn btn-sm', onClick: () => { addingSongScore = true; render(); } }, '+ Add Song') : ''
    ),

    addingSongScore ? h('div', { style: { background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: '8px', padding: '10px', marginBottom: '10px' } },
      h('div', { class: 'form-row' },
        h('div', { class: 'form-group' },
          h('label', {}, 'Title'),
          h('input', { class: 'input', id: 'ss-title', placeholder: 'e.g. Pride and Joy' })
        ),
        h('div', { class: 'form-group' },
          h('label', {}, 'Artist'),
          h('input', { class: 'input', id: 'ss-artist', placeholder: 'e.g. SRV' })
        )
      ),
      h('div', { class: 'form-group' },
        h('label', {}, 'Initial Score'),
        h('div', { id: 'ss-initial-stars', style: { display: 'flex', gap: '4px', alignItems: 'center', marginTop: '4px' } },
          ...[1,2,3,4,5].map(n =>
            h('span', {
              'data-val': '' + n,
              class: 'ss-new-star',
              style: { fontSize: '22px', cursor: 'pointer', color: 'var(--border)', lineHeight: '1', userSelect: 'none' },
              onClick: (e) => {
                const val = parseInt(e.target.getAttribute('data-val'));
                document.querySelectorAll('.ss-new-star').forEach(el => {
                  el.style.color = parseInt(el.getAttribute('data-val')) <= val ? 'var(--accent)' : 'var(--border)';
                });
                document.getElementById('ss-score-val').value = '' + val;
              }
            }, '☆')
          ),
          h('input', { type: 'hidden', id: 'ss-score-val', value: '1' })
        )
      ),
      h('div', { style: { display: 'flex', gap: '6px', marginTop: '4px' } },
        h('button', { class: 'btn btn-sm', onClick: () => {
          const title = document.getElementById('ss-title').value.trim();
          const artist = document.getElementById('ss-artist').value.trim();
          const score = parseInt(document.getElementById('ss-score-val').value) || 1;
          if (!title) { alert('Song title is required.'); return; }
          const today = localToday();
          const songId = uid();
          const entry = { title, artist: artist || '', score, lastUpdated: today, history: [{ date: today, score }] };
          if (!s.songScores) s.songScores = {};
          s.songScores[songId] = entry;
          fbSave("students/" + studentKey + "/songScores/" + songId, entry);
          addingSongScore = false;
          render();
        }}, 'Add Song'),
        h('button', { class: 'btn-outline', onClick: () => { addingSongScore = false; render(); } }, 'Cancel')
      )
    ) : '',

    songList.length === 0 && !addingSongScore
      ? h('p', { style: { color: 'var(--muted)', fontSize: '12px' } }, 'No songs scored yet.')
      : '',

    ...songList.map(([songId, song]) =>
      h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid var(--border)' } },
        h('div', { style: { flex: '1', minWidth: '0' } },
          h('div', { style: { fontSize: '13px', fontWeight: '600' } }, song.title),
          h('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '2px' } }, (song.artist || '') + (song.lastUpdated ? ' · ' + song.lastUpdated : '')),
          h('div', { style: { fontSize: '10px', color: 'var(--accent)', fontWeight: '600' } }, SCORE_LABELS[song.score] || '')
        ),
        h('div', { style: { display: 'flex', gap: '2px', alignItems: 'center', flexShrink: '0' } },
          ...[1,2,3,4,5].map(n =>
            h('span', {
              style: { fontSize: '18px', cursor: 'pointer', color: n <= song.score ? 'var(--accent)' : 'var(--border)', lineHeight: '1', userSelect: 'none' },
              onClick: () => {
                if (n === song.score) return;
                const today = localToday();
                song.score = n;
                song.lastUpdated = today;
                if (!song.history) song.history = [];
                song.history.push({ date: today, score: n });
                fbSave("students/" + studentKey + "/songScores/" + songId + "/score", n);
                fbSave("students/" + studentKey + "/songScores/" + songId + "/lastUpdated", today);
                fbSave("students/" + studentKey + "/songScores/" + songId + "/history", song.history);
                render();
              }
            }, n <= song.score ? '★' : '☆')
          )
        )
      )
    )
  );
}

function getAdminWeekId(date) {
  const d = new Date(date);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const days = Math.floor((d - jan1) / 86400000);
  const week = Math.ceil((days + jan1.getDay() + 1) / 7);
  return d.getFullYear() + '-W' + String(week).padStart(2, '0');
}

function weekIdToLabel(weekId) {
  if (!weekId) return weekId;
  const match = weekId.match(/^(\d{4})-W(\d{2})$/);
  if (!match) return weekId;
  const year = parseInt(match[1], 10);
  const week = parseInt(match[2], 10);
  const jan1 = new Date(year, 0, 1);
  const offset = (jan1.getDay() + 6) % 7;
  const monday = new Date(jan1);
  monday.setDate(jan1.getDate() - offset + (week - 1) * 7);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return fmt(monday) + ' – ' + fmt(sunday);
}

function renderLessonInput() {
  const students = localData.students;
  const keys = Object.keys(students).filter(k => students[k].profile.active !== false);
  const today = new Date();
  // Compute current week in "YYYY-W##" format for default
  const currentWeekId = getAdminWeekId(today);
  // Default the week input value (HTML week input uses "YYYY-W##" with zero-padded week)
  const weekInputDefault = currentWeekId;

  // Gather all assigned itineraries across students (sorted newest first)
  const allItineraries = [];
  keys.forEach(k => {
    const itinerary = students[k].itinerary;
    if (itinerary && typeof itinerary === 'object') {
      Object.entries(itinerary).forEach(([weekId, data]) => {
        allItineraries.push({ studentKey: k, studentName: students[k].profile.name, weekId, ...data });
      });
    }
  });
  allItineraries.sort((a, b) => (b.assignedAt || b.weekId || '').localeCompare(a.assignedAt || a.weekId || ''));

  function renderItineraryCard(entry) {
    const isEditing = editingItinerary
      && editingItinerary.studentKey === entry.studentKey
      && editingItinerary.weekId === entry.weekId;

    if (isEditing) {
      return h('div', { class: 'card', style: { borderLeft: '3px solid var(--accent)', marginBottom: '10px' } },
        h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' } },
          h('div', {},
            h('div', { style: { fontWeight: '600', fontSize: '13px' } }, entry.studentName),
            h('div', { style: { fontSize: '11px', color: 'var(--accent)', marginTop: '2px' } }, entry.weekId + ' (' + weekIdToLabel(entry.weekId) + ')')
          ),
          h('button', { class: 'btn-outline', onClick: () => { editingItinerary = null; render(); } }, '✕ Cancel')
        ),
        h('div', { class: 'form-group' },
          h('textarea', { class: 'input', id: 'edit-itin-text', rows: '7', style: { resize: 'vertical', lineHeight: '1.6' }, html: '' })
        ),
        h('button', { class: 'btn btn-sm', onClick: async () => {
          const text = document.getElementById('edit-itin-text').value.trim();
          if (!text) { alert('Please enter itinerary text.'); return; }
          const updated = { text, assignedAt: new Date().toISOString(), week: entry.weekId };
          if (!students[entry.studentKey].itinerary) students[entry.studentKey].itinerary = {};
          students[entry.studentKey].itinerary[entry.weekId] = updated;
          await fbSave('students/' + entry.studentKey + '/itinerary/' + entry.weekId, updated);
          editingItinerary = null;
          render();
        }}, 'Save Changes')
      );
    }

    const preview = entry.text
      ? (entry.text.length > 140 ? entry.text.slice(0, 140) + '…' : entry.text)
      : '(empty)';

    return h('div', { class: 'card', style: { borderLeft: '3px solid var(--border)', marginBottom: '8px' } },
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '6px' } },
        h('div', { style: { flex: '1', minWidth: '0' } },
          h('div', { style: { fontWeight: '600', fontSize: '13px' } }, entry.studentName),
          h('div', { style: { fontSize: '11px', color: 'var(--accent)', marginTop: '1px' } }, entry.weekId + ' · ' + weekIdToLabel(entry.weekId))
        ),
        h('button', {
          class: 'btn-outline',
          style: { fontSize: '11px', padding: '3px 10px', flexShrink: '0', marginLeft: '8px' },
          onClick: () => {
            editingItinerary = { studentKey: entry.studentKey, weekId: entry.weekId };
            render();
            setTimeout(() => {
              const el = document.getElementById('edit-itin-text');
              if (el) el.value = entry.text || '';
            }, 0);
          }
        }, 'Edit')
      ),
      h('p', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.5', whiteSpace: 'pre-wrap' } }, preview)
    );
  }

  return h('div', { class: 'pad' },
    h('h2', { class: 'section-title' }, 'Weekly Itinerary'),
    h('p', { class: 'section-sub' }, 'Assign a weekly practice plan to a student'),

    h('div', { class: 'card card-accent' },
      h('div', { class: 'form-group' },
        h('label', {}, 'Student'),
        h('select', { class: 'input', id: 'itin-student',
          onChange: (e) => { lessonStudent = e.target.value; addingSongScore = false; render(); }
        },
          h('option', { value: '' }, 'Select student...'),
          ...keys.map(k => h('option', { value: k, ...(k === lessonStudent ? { selected: 'selected' } : {}) }, students[k].profile.name))
        )
      ),
      h('div', { class: 'form-group' },
        h('label', {}, 'Week'),
        h('input', { class: 'input', id: 'itin-week', type: 'week', value: weekInputDefault })
      ),
      h('div', { class: 'form-group' },
        h('label', {}, 'Practice Itinerary'),
        h('textarea', {
          class: 'input', id: 'itin-text', rows: '8',
          placeholder: 'Write the student\'s weekly practice plan here.\n\nFor example:\n\u2022 Warm-up: chromatic scales, 5 min\n\u2022 Technique: finger independence exercises p.14, 10 min\n\u2022 Repertoire: \u201cSuperstition\u201d verse groove, slow tempo, 15 min\n\u2022 Goal: clean riff transitions before next lesson',
          style: { resize: 'vertical', lineHeight: '1.6' }
        })
      ),
      h('button', { class: 'btn', onClick: async () => {
        const studentKey = document.getElementById('itin-student').value;
        const weekRaw = document.getElementById('itin-week').value;
        const text = document.getElementById('itin-text').value.trim();
        if (!studentKey) { alert('Please select a student.'); return; }
        if (!text) { alert('Please write an itinerary.'); return; }
        if (!weekRaw) { alert('Please select a week.'); return; }
        // Browser week input returns "YYYY-W##" already
        const weekId = weekRaw;
        const entry = { text, assignedAt: new Date().toISOString(), week: weekId };
        if (!students[studentKey].itinerary) students[studentKey].itinerary = {};
        students[studentKey].itinerary[weekId] = entry;
        await fbSave('students/' + studentKey + '/itinerary/' + weekId, entry);
        document.getElementById('itin-text').value = '';
        render();
      }}, 'Assign Itinerary')
    ),

    // Song Scores for selected student
    lessonStudent ? renderSongScores(lessonStudent) : '',

    allItineraries.length > 0 ? h('div', {},
      h('div', { class: 'label', style: { marginTop: '8px', marginBottom: '8px' } }, 'Previously Assigned'),
      ...allItineraries.map(renderItineraryCard)
    ) : ''
  );
}

function renderAddEnsembleForm() {
  return h('div', { class: 'card card-accent', style: { marginBottom: '16px' } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' } },
      h('div', { style: { fontWeight: '600', fontSize: '15px' } }, 'Add New Ensemble'),
      h('button', { class: 'btn-outline', onClick: () => { showAddEnsemble = false; newEnsMembers = []; render(); } }, '✕ Cancel')
    ),
    h('div', { class: 'form-group' },
      h('label', {}, 'Ensemble Name'),
      h('input', { class: 'input', id: 'new-ens-name', placeholder: 'e.g. Funk Cadets' })
    ),
    h('div', { class: 'form-row' },
      h('div', { class: 'form-group' },
        h('label', {}, 'Schedule'),
        h('input', { class: 'input', id: 'new-ens-schedule', placeholder: 'e.g. Sundays 2:00-4:30 PM' })
      ),
      h('div', { class: 'form-group' },
        h('label', {}, 'Location'),
        h('input', { class: 'input', id: 'new-ens-location', placeholder: 'e.g. Studio S, Oakland', value: 'Studio S, Oakland' })
      )
    ),
    renderMemberPicker(newEnsMembers, (name) => {
      const idx = newEnsMembers.indexOf(name);
      if (idx === -1) newEnsMembers.push(name); else newEnsMembers.splice(idx, 1);
      render();
    }, 'new-ens-member-input'),
    h('button', { class: 'btn', style: { marginTop: '4px' }, onClick: () => {
      const name = document.getElementById('new-ens-name').value.trim();
      const schedule = document.getElementById('new-ens-schedule').value.trim();
      const location = document.getElementById('new-ens-location').value.trim();
      if (!name) { alert('Please enter an ensemble name.'); return; }
      const key = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      if (localData.ensembles[key]) { alert('An ensemble with a similar name already exists.'); return; }
      localData.ensembles[key] = {
        info: { name, schedule, location, members: [...newEnsMembers] },
        repertoire: []
      };
      // Add program entry for students selected as members
      for (const memberName of newEnsMembers) {
        const studentEntry = Object.entries(localData.students).find(([, s]) => s.profile.name === memberName);
        if (studentEntry) {
          const [sKey, sData] = studentEntry;
          if (!sData.programs) sData.programs = {};
          if (!sData.programs[key]) {
            sData.programs[key] = { type: 'ensemble', name, ensembleId: key, rate: 62.50, lessonDay: null, lessonTime: null };
            fbSave("students/" + sKey + "/programs/" + key, sData.programs[key]);
          }
        }
      }
      saveLocalData(['ensembles']);
      showAddEnsemble = false;
      newEnsMembers = [];
      render();
    }}, 'Add Ensemble')
  );
}

function renderEditEnsembleForm(key) {
  const ens = localData.ensembles[key];
  const info = ens.info;
  // Initialize editEnsMembers from current ensemble when first opening
  if (editingEnsemble === key && editEnsMembers._key !== key) {
    editEnsMembers = [...(info.members || [])];
    editEnsMembers._key = key;
  }
  return h('div', { class: 'card card-accent', style: { marginBottom: '16px' } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' } },
      h('div', { style: { fontWeight: '600', fontSize: '15px' } }, 'Edit Ensemble — ' + info.name),
      h('button', { class: 'btn-outline', onClick: () => { editingEnsemble = null; editEnsMembers = []; render(); } }, '✕ Cancel')
    ),
    h('div', { class: 'form-group' },
      h('label', {}, 'Ensemble Name'),
      h('input', { class: 'input', id: 'edit-ens-name', value: info.name })
    ),
    h('div', { class: 'form-row' },
      h('div', { class: 'form-group' },
        h('label', {}, 'Schedule'),
        h('input', { class: 'input', id: 'edit-ens-schedule', value: info.schedule || '' })
      ),
      h('div', { class: 'form-group' },
        h('label', {}, 'Location'),
        h('input', { class: 'input', id: 'edit-ens-location', value: info.location || '' })
      )
    ),
    renderMemberPicker(editEnsMembers, (name) => {
      const idx = editEnsMembers.indexOf(name);
      if (idx === -1) editEnsMembers.push(name); else editEnsMembers.splice(idx, 1);
      render();
    }, 'edit-ens-member-input'),
    h('div', { style: { display: 'flex', gap: '8px', marginTop: '4px' } },
      h('button', { class: 'btn', onClick: () => {
        const name = document.getElementById('edit-ens-name').value.trim();
        const schedule = document.getElementById('edit-ens-schedule').value.trim();
        const location = document.getElementById('edit-ens-location').value.trim();
        if (!name) { alert('Ensemble name is required.'); return; }
        const oldMembers = ens.info.members || [];
        const newMembers = [...editEnsMembers];
        // Remove program entry for removed members
        for (const memberName of oldMembers) {
          if (!newMembers.includes(memberName)) {
            const studentEntry = Object.entries(localData.students).find(([, s]) => s.profile.name === memberName);
            if (studentEntry) {
              const [sKey, sData] = studentEntry;
              if (sData.programs && sData.programs[key]) {
                delete sData.programs[key];
                fbSave("students/" + sKey + "/programs/" + key, null);
              }
            }
          }
        }
        // Add program entry for added members
        for (const memberName of newMembers) {
          if (!oldMembers.includes(memberName)) {
            const studentEntry = Object.entries(localData.students).find(([, s]) => s.profile.name === memberName);
            if (studentEntry) {
              const [sKey, sData] = studentEntry;
              if (!sData.programs) sData.programs = {};
              if (!sData.programs[key]) {
                sData.programs[key] = { type: 'ensemble', name, ensembleId: key, rate: 62.50, lessonDay: null, lessonTime: null };
                fbSave("students/" + sKey + "/programs/" + key, sData.programs[key]);
              }
            }
          }
        }
        ens.info = { ...ens.info, name, schedule, location, members: newMembers };
        saveLocalData(['ensembles']);
        editingEnsemble = null;
        editEnsMembers = [];
        render();
      }}, 'Save Changes'),
      h('button', { class: 'btn-outline', style: { color: 'var(--red)', borderColor: 'var(--red)' }, onClick: () => {
        if (!confirm('Delete ' + info.name + '? This removes the ensemble and all its repertoire. This cannot be undone.')) return;
        // Remove this ensemble's program entry from all students
        for (const [sKey, student] of Object.entries(localData.students)) {
          if (student.programs && student.programs[key]) {
            delete student.programs[key];
            fbSave("students/" + sKey + "/programs/" + key, null);
          }
        }
        delete localData.ensembles[key];
        saveLocalData(['ensembles']);
        editingEnsemble = null;
        render();
      }}, 'Delete Ensemble')
    )
  );
}
