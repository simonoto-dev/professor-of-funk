/* ===== DATE HELPERS ===== */
function sheetDate(mdy) {
  if (!mdy) return null;
  const parts = mdy.trim().split('/');
  if (parts.length !== 3) return null;
  const [m, d, y] = parts;
  return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}

function normMethod(m) {
  if (!m) return '';
  const l = m.trim().toLowerCase();
  if (l === 'venmo') return 'Venmo';
  if (l === 'zelle') return 'Zelle';
  if (l === 'paypal') return 'PayPal';
  if (l === 'cash') return 'Cash';
  if (l === 'check') return 'Check';
  return m.trim();
}

function studentKey(name) {
  return name.toLowerCase().replace(/[^a-z0-9]/g, '');

/* =========================================================================

const ENSEMBLES = {
  "adv-groove-ensemble": { name: "Adv. Groove Ensemble", schedule: "Sundays 2:00-4:30 PM", location: "Studio S, Oakland" },
  "beg-groove-ensemble": { name: "Beg. Groove Ensemble", schedule: "Saturdays 10:00 AM-12:30 PM", location: "Studio S, Oakland" },
  "challaday": { name: "Challaday", schedule: "Mondays 4:00-5:30 PM", location: "Congregation Beth El, Berkeley" },
  "private": { name: "Private Lessons", schedule: "", location: "" }
};

/* Map ensemble display names to programIds */
function ensembleToProgramId(ensName) {
  const m = {
    "Adv. Groove Ensemble": "adv-groove-ensemble",
    "Beg. Groove Ensemble": "beg-groove-ensemble",
    "Challaday": "challaday",
    "Private Lessons": "private"
  };
  return m[ensName] || ensName.toLowerCase().replace(/[^a-z0-9]+/g, '-');
}

/* =========================================================================
   MIGRATION LOGIC
   ========================================================================= */

let DRY_RUN = false;

async function fbWrite(path, val) {
  if (DRY_RUN) { logInfo(`[DRY] Would write ${path}`); return; }
  await dbRef(path).set(val);
}

async function fbUpdate(path, val) {
  if (DRY_RUN) { logInfo(`[DRY] Would update ${path}`); return; }
  await dbRef(path).update(val);
}

async function createAuth(email, password) {
  if (DRY_RUN) { logInfo(`[DRY] Would create auth: ${email}`); return 'dry-run-uid'; }
  try {
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, password);
    await secondaryApp.auth().signOut();
    return cred.user.uid;
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') {
      try {
        const cred = await secondaryApp.auth().signInWithEmailAndPassword(email, password);
        const uid = cred.user.uid;
        await secondaryApp.auth().signOut();
        return uid;
      } catch(e2) { return null; }
    }
    return null;
  }
}

/* ---- Name normalization for payment matching ---- */
function normName(n) { return n.trim().toLowerCase().replace(/\s+/g, ' '); }

function findStudentForPayment(clientName) {
  const cn = normName(clientName);
  // Exact match first
  for (const s of STUDENTS) {
    if (normName(s.name) === cn) return s.name;
  }
  // "Micah Lawson Private" handled above
  // Special case: "Gerardo Rodriguez" not in STUDENTS
  return null;
}

async function runDryRun() {
  DRY_RUN = true;
  logEl().innerHTML = '';
  log('=== DRY RUN — No data will be written ===\n', 'log-warn');
  await doMigration();
  DRY_RUN = false;
}

async function runMigration(reset) {
  DRY_RUN = false;
  logEl().innerHTML = '';
  if (reset) {
    logWarn('Resetting all student data before migration...');
    await dbRef('students').remove();
    await dbRef('meta/accessCodes').remove();
    await dbRef('meta/parentAccessCodes').remove();
    await dbRef('parents').remove();
    logOk('Reset complete');
  }
  log('=== LIVE MIGRATION — Writing to Firebase ===\n', 'log-info');
  await doMigration();
}

async function doMigration() {
  const t0 = Date.now();
  let studentCount = 0, programCount = 0, attendanceCount = 0, paymentCount = 0, authCount = 0, parentCount = 0;

  // Build rate lookup
  const rateMap = {};
  RATES.forEach(r => { rateMap[r.client] = r.rate; });

  // Build student name -> key lookup, merging Micah Lawson + Micah Lawson Private
  const studentMap = {}; // name -> { key, data }
  const processedKeys = new Set();

  log('=== STEP 1: MAP STUDENTS ===\n');

  for (const s of STUDENTS) {
    // Skip the "Micah Lawson Private" row — we merge it into "Micah Lawson"
    if (s.name === "Micah Lawson Private") continue;

    const key = studentKey(s.name);
    if (processedKeys.has(key)) {
      logWarn(`Duplicate key ${key} for ${s.name} — skipping`);
      continue;
    }
    processedKeys.add(key);

    const programId = ensembleToProgramId(s.ensemble);
    const rate = rateMap[s.name] || 62.50;
    const accessCode = key.slice(0, 8) + (Math.floor(Math.random()*90)+10);

    const profile = {
      name: s.name,
      instrument: s.instrument.toLowerCase(),
      startDate: sheetDate(s.startDate),
      accessCode: accessCode,
      authUid: null,
      parentName: s.parentNames,
      parentEmail: s.parentEmail,
      parentAuthUid: null,
      parentAccessCode: null,
      ageGrade: s.ageGrade || '',
      skillLevel: s.skillLevel || '',
      allergies: s.allergies || '',
      phone: s.phone || '',
      emergencyContact: s.emergencyContact || '',
      active: s.active !== false
    };

    const programs = {};
    // Primary program
    if (programId === 'private') {
      programs.private = {
        type: 'private',
        name: 'Private Lessons',
        ensembleId: null,
        rate: rate,
        lessonDay: null,
        lessonTime: null
      };
    } else {
      programs[programId] = {
        type: 'ensemble',
        name: s.ensemble,
        ensembleId: programId,
        rate: rate,
        lessonDay: null,
        lessonTime: null
      };
    }

    // Check if this student also has private lessons (Micah Lawson dual enrollment)
    if (s.name === "Micah Lawson") {
      const privRate = rateMap["Micah Lawson Private"] || 125;
      programs.private = {
        type: 'private',
        name: 'Private Lessons',
        ensembleId: null,
        rate: privRate,
        lessonDay: null,
        lessonTime: null
      };
      logInfo(`Micah Lawson: dual enrollment — Challaday ($${rate}) + Private ($${privRate})`);
    }

    studentMap[s.name] = { key, profile, programs };
    if (s.name === "Micah Lawson") {
      studentMap["Micah Lawson Private"] = { key, profile, programs }; // alias for payment matching
    }

    logOk(`${s.name} -> ${key} [${programId}] $${rate}${s.active === false ? ' (INACTIVE)' : ''}`);
    studentCount++;
  }

  // Handle edge cases: Thomas Kroll (in attendance, not in Database)
  const tkKey = 'thomaskroll';
  studentMap["Thomas Kroll"] = {
    key: tkKey,
    profile: {
      name: "Thomas Kroll", instrument: "unknown", startDate: "2025-03-08",
      accessCode: 'thomaskr' + (Math.floor(Math.random()*90)+10),
      authUid: null, parentName: "", parentEmail: "", parentAuthUid: null, parentAccessCode: null,
      ageGrade: "", skillLevel: "", allergies: "", phone: "", emergencyContact: "", active: false
    },
    programs: {
      "adv-groove-ensemble": { type: "ensemble", name: "Adv. Groove Ensemble", ensembleId: "adv-groove-ensemble", rate: 62.50, lessonDay: null, lessonTime: null }
    }
  };
  processedKeys.add(tkKey);
  logWarn('Thomas Kroll: minimal record (attendance only, not in Database tab)');
  studentCount++;

  // Handle edge case: Gerardo Rodriguez (payments only)
  const grKey = 'gerardorodriguez';
  studentMap["Gerardo Rodriguez"] = {
    key: grKey,
    profile: {
      name: "Gerardo Rodriguez", instrument: "unknown", startDate: "2025-05-28",
      accessCode: 'gerardor' + (Math.floor(Math.random()*90)+10),
      authUid: null, parentName: "", parentEmail: "", parentAuthUid: null, parentAccessCode: null,
      ageGrade: "", skillLevel: "", allergies: "", phone: "", emergencyContact: "", active: false
    },
    programs: {}
  };
  processedKeys.add(grKey);
  logWarn('Gerardo Rodriguez: minimal record (payment only, not in Database tab)');
  studentCount++;

  log(`\n=== STEP 2: WRITE STUDENT RECORDS ===\n`);

  // Write all student profiles and programs
  for (const [name, { key, profile, programs }] of Object.entries(studentMap)) {
    // Skip aliases (Micah Lawson Private)
    if (name === "Micah Lawson Private") continue;

    // Create auth account
    const authEmail = key + '@professoroffunk.app';
    const authUid = await createAuth(authEmail, profile.accessCode + '!PoF');
    if (authUid) {
      profile.authUid = authUid;
      authCount++;
    }

    // Preserve existing lessons, practice, milestones, resources if they exist
    let existing = null;
    if (!DRY_RUN) {
      const snap = await dbRef('students/' + key).once('value');
      existing = snap.val();
    }

    const studentData = {
      profile: profile,
      programs: programs,
      attendance: {},
      payments: {},
      lessons: (existing && existing.lessons) || {},
      practice: (existing && existing.practice) || {},
      milestones: (existing && existing.milestones) || {},
      resources: (existing && existing.resources) || {}
    };

    await fbWrite('students/' + key, studentData);
    await fbWrite('meta/accessCodes/' + profile.accessCode, key);

    programCount += Object.keys(programs).length;
    logOk(`Wrote ${key} with ${Object.keys(programs).length} program(s)`);
  }

  log(`\n=== STEP 3: MIGRATE ATTENDANCE ===\n`);

  // Process each attendance grid
  const grids = [
    { data: ATT_ADV, label: "Adv. Groove Ensemble" },
    { data: ATT_BEG, label: "Beg. Groove Ensemble" },
    { data: ATT_CHAL, label: "Challaday" },
    { data: ATT_PRIV, label: "Private Lessons" }
  ];

  for (const grid of grids) {
    logInfo(`Processing ${grid.label} attendance...`);
    for (let mi = 0; mi < grid.data.members.length; mi++) {
      const memberName = grid.data.members[mi];
      const sm = studentMap[memberName];
      if (!sm) {
        logWarn(`  ${memberName}: not found in student map — skipping`);
        continue;
      }

      // Determine which programId to store attendance under
      // Use the student's enrolled program from Database tab, NOT the grid label
      let programId;
      const enrolledPrograms = Object.keys(sm.programs);
      if (memberName === "Micah Lawson Private") {
        programId = "private";
      } else if (memberName === "Micah Lawson" && grid.label === "Challaday") {
        programId = "challaday";
      } else if (enrolledPrograms.length === 1) {
        programId = enrolledPrograms[0];
      } else {
        // For dual-enrollment, match to grid
        programId = ensembleToProgramId(grid.label);
      }

      let count = 0;
      for (const [dateStr, vals] of grid.data.dates) {
        const v = vals[mi];
        if (v === "" || v === undefined) continue; // skip empty = not enrolled yet
        const fbDate = sheetDate(dateStr);
        if (!fbDate) continue;
        const present = (v === "1" || v === "3"); // "3" treated as present (data anomaly)
        await fbWrite(`students/${sm.key}/attendance/${programId}/${fbDate}`, { present });
        attendanceCount++;
        count++;
      }
      logOk(`  ${memberName} -> ${sm.key}/attendance/${programId}: ${count} records`);
    }
  }

  log(`\n=== STEP 4: MIGRATE PAYMENTS ===\n`);

  // Group payments by student
  const paymentsByStudent = {};
  const orphanedPayments = [];

  for (const p of PAYMENTS) {
    const matchName = findStudentForPayment(p.client);
    if (!matchName) {
      // Try special case: "Gerardo Rodriguez"
      if (normName(p.client) === 'gerardo rodriguez') {
        const key = 'gerardorodriguez';
        if (!paymentsByStudent[key]) paymentsByStudent[key] = [];
        paymentsByStudent[key].push(p);
        continue;
      }
      logWarn(`Orphaned payment: ${p.client} $${p.amount} on ${p.date}`);
      orphanedPayments.push(p);
      continue;
    }
    const sm = studentMap[matchName];
    if (!sm) {
      logWarn(`No student map entry for ${matchName}`);
      continue;
    }
    if (!paymentsByStudent[sm.key]) paymentsByStudent[sm.key] = [];
    paymentsByStudent[sm.key].push({ ...p, resolvedName: matchName });
  }

  for (const [key, payments] of Object.entries(paymentsByStudent)) {
    for (const p of payments) {
      const payId = uid();
      const fbDate = sheetDate(p.date) || new Date().toISOString().slice(0, 10);
      const payData = {
        date: fbDate,
        amount: p.amount,
        method: normMethod(p.method),
        note: '',
        programId: null
      };
      // Tag Micah Lawson Private payments with programId
      if (p.resolvedName === "Micah Lawson Private" || normName(p.client).includes('private')) {
        payData.programId = 'private';
      }
      await fbWrite(`students/${key}/payments/${payId}`, payData);
      paymentCount++;
    }
    logOk(`${key}: ${payments.length} payment(s)`);
  }

  log(`\n=== STEP 5: CREATE PARENT RECORDS ===\n`);

  // Group students by parent
  const parentGroups = {};
  for (const [name, { key, profile }] of Object.entries(studentMap)) {
    if (name === "Micah Lawson Private") continue;
    if (!profile.parentName) continue;
    // Use parent email as parent group key (or name if no email)
    const pKey = (profile.parentEmail || profile.parentName).split(',')[0].trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    if (!parentGroups[pKey]) parentGroups[pKey] = { parentName: profile.parentName, parentEmail: profile.parentEmail, children: [] };
    parentGroups[pKey].children.push(key);
  }

  for (const [pKey, group] of Object.entries(parentGroups)) {
    const parentId = pKey.slice(0, 20);
    const parentCode = parentId + '-parent';
    const parentAuthUid = await createAuth(parentId + '@parent.professoroffunk.app', parentCode + '!PoF');

    const parentRecord = {
      profile: {
        name: group.parentName,
        email: group.parentEmail,
        accessCode: parentCode,
        authUid: parentAuthUid || null
      },
      children: {}
    };
    group.children.forEach(ck => { parentRecord.children[ck] = true; });

    await fbWrite('parents/' + parentId, parentRecord);
    await fbWrite('meta/parentAccessCodes/' + parentCode, parentId);

    // Update student profiles with parent info
    for (const ck of group.children) {
      await fbWrite(`students/${ck}/profile/parentAuthUid`, parentAuthUid || null);
      await fbWrite(`students/${ck}/profile/parentAccessCode`, parentCode);
    }

    logOk(`Parent: ${group.parentName} -> ${parentId} (${group.children.length} children: ${group.children.join(', ')})`);
    parentCount++;
  }

  log(`\n=== STEP 6: WRITE ENSEMBLES & META ===\n`);

  // Write/update ensemble records
  for (const [ensId, ensInfo] of Object.entries(ENSEMBLES)) {
    if (ensId === 'private') continue; // Private isn't an ensemble
    // Find members for this ensemble
    const members = [];
    for (const [name, { key, programs }] of Object.entries(studentMap)) {
      if (name === "Micah Lawson Private") continue;
      if (programs[ensId]) members.push(name);
    }

    // Preserve existing repertoire and assignments
    let existing = null;
    if (!DRY_RUN) {
      const snap = await dbRef('ensembles/' + ensId).once('value');
      existing = snap.val();
    }

    const ensData = {
      info: {
        name: ensInfo.name,
        schedule: ensInfo.schedule,
        location: ensInfo.location,
        members: members
      },
      repertoire: (existing && existing.repertoire) || [],
      assignments: (existing && existing.assignments) || []
    };
    await fbWrite('ensembles/' + ensId, ensData);
    logOk(`Ensemble: ${ensInfo.name} — ${members.length} members`);
  }

  // Write meta/rates
  await fbWrite('meta/rates', { defaultBand: 62.50, defaultPrivate: 125.00 });
  logOk('Wrote meta/rates: band=$62.50, private=$125.00');

  log(`\n=== STEP 7: CLEANUP OLD FIELDS ===\n`);

  if (!DRY_RUN) {
    // Remove old fields from student records
    for (const [name, { key }] of Object.entries(studentMap)) {
      if (name === "Micah Lawson Private") continue;
      const cleanups = {
        'billing': null,
        'paymentStatus': null,
        'lastLesson': null,
        'nextLesson': null,
        'profile/program': null,
        'profile/privateRate': null,
        'profile/groupRate': null,
        'profile/ensembleId': null,
        'profile/lessonDay': null,
        'profile/lessonTime': null,
        'profile/rate': null
      };
      for (const [field, val] of Object.entries(cleanups)) {
        try { await dbRef(`students/${key}/${field}`).remove(); } catch(e) {}
      }
    }
    logOk('Removed old fields: billing, paymentStatus, lastLesson, nextLesson, profile.program/privateRate/groupRate/ensembleId');
  } else {
    logInfo('[DRY] Would remove old billing/paymentStatus/lastLesson/nextLesson fields');
  }

  log(`\n=== STEP 8: VERIFICATION ===\n`);

  // Verify by computing billing for each student and comparing to sheet totals
  const sheetTotals = {};
  STUDENTS.forEach(s => {
    const key = studentKey(s.name === "Micah Lawson Private" ? "Micah Lawson" : s.name);
    if (!sheetTotals[key]) sheetTotals[key] = { tuition: 0, paid: 0 };
    sheetTotals[key].tuition += s.totalTuition;
    sheetTotals[key].paid += s.tuitionPaid;
  });

  if (!DRY_RUN) {
    let verified = 0, mismatches = 0;
    for (const [key, expected] of Object.entries(sheetTotals)) {
      const snap = await dbRef('students/' + key).once('value');
      const student = snap.val();
      if (!student) { logErr(`  ${key}: NOT FOUND in Firebase`); mismatches++; continue; }

      // Compute tuition from attendance * rate
      let totalTuition = 0;
      const progs = student.programs || {};
      const att = student.attendance || {};
      for (const [pid, prog] of Object.entries(progs)) {
        const dates = att[pid] || {};
        const attended = Object.values(dates).filter(a => a.present).length;
        totalTuition += attended * prog.rate;
      }

      // Compute total paid
      const payments = student.payments || {};
      const totalPaid = Object.values(payments).reduce((sum, p) => sum + (p.amount || 0), 0);

      const tuitionMatch = Math.abs(totalTuition - expected.tuition) < 0.01;
      const paidMatch = Math.abs(totalPaid - expected.paid) < 0.01;

      if (tuitionMatch && paidMatch) {
        logOk(`  ${key}: tuition=$${totalTuition} paid=$${totalPaid} ✓`);
        verified++;
      } else {
        if (!tuitionMatch) logErr(`  ${key}: tuition=$${totalTuition} (expected $${expected.tuition})`);
        if (!paidMatch) logErr(`  ${key}: paid=$${totalPaid} (expected $${expected.paid})`);
        mismatches++;
      }
    }
    log(`\nVerification: ${verified} matched, ${mismatches} mismatches`, mismatches > 0 ? 'log-warn' : 'log-ok');
  }

  const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
  log(`\n${'='.repeat(50)}`, '');
  log(`Migration ${DRY_RUN ? '(DRY RUN) ' : ''}complete in ${elapsed}s`, 'log-ok');
  log(`  Students: ${studentCount}`, '');
  log(`  Programs: ${programCount}`, '');
  log(`  Attendance records: ${attendanceCount}`, '');
  log(`  Payment records: ${paymentCount}`, '');
  log(`  Auth accounts: ${authCount}`, '');
  log(`  Parent records: ${parentCount}`, '');
  if (orphanedPayments.length) log(`  Orphaned payments: ${orphanedPayments.length}`, 'log-warn');
}
