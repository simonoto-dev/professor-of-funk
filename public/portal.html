<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1a1a24; --border:#2a2a35;
  --accent:#D4943A; --accent-glow:rgba(212,148,58,0.15); --accent-dim:#7A4A28;
  --green:#4ade80; --red:#f87171; --blue:#60a5fa; --purple:#c084fc; --yellow:#fbbf24;
  --text:#e8e8ef; --muted:#888899;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans','Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;}
input,textarea,select,button{font-family:inherit;font-size:inherit;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:var(--safe-top);}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:52px;flex-shrink:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;margin-right:auto;}
.logo-icon{font-size:18px;}
.logo-name{font-family:'DM Serif Display',Georgia,serif;font-size:16px;font-weight:700;color:var(--accent);}
.logo-sub{color:var(--muted);font-size:10px;font-weight:500;display:none;}
@media(min-width:500px){.logo-sub{display:inline;}}
.header-user{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:11px;}
.header-user span{color:var(--accent);font-weight:600;}
.header-logout{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--muted);font-size:10px;cursor:pointer;margin-left:8px;}
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:9px;font-weight:500;transition:color 0.2s;}
.nav-btn.active{color:var(--accent);}
.nav-btn .nav-icon{font-size:18px;line-height:1;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.pad{padding:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.card-accent{border-top:3px solid var(--accent);}
.section-title{font-family:'DM Serif Display',Georgia,serif;font-size:20px;margin:0 0 4px;}
.section-sub{color:var(--muted);font-size:12px;margin:0 0 16px;}
.label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
.badge-green{background:rgba(74,222,128,0.15);color:var(--green);}
.badge-blue{background:rgba(96,165,250,0.15);color:var(--blue);}
.badge-purple{background:rgba(192,132,252,0.15);color:var(--purple);}
.badge-yellow{background:rgba(251,191,36,0.15);color:var(--yellow);}
.badge-accent{background:var(--accent-glow);color:var(--accent);}
.btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;}
.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);outline:none;font-size:14px;}
.input:focus{border-color:var(--accent);}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.stat-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;}
.stat-value{font-family:'DM Serif Display',Georgia,serif;font-size:24px;font-weight:700;color:var(--text);margin:2px 0;}
.stat-sub{color:var(--muted);font-size:11px;}
.progress{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:4px 0;}
.progress-fill{height:100%;border-radius:3px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}
.practice-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:12px 0;}
.practice-day{text-align:center;}
.practice-day-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:4px;}
.practice-check{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto;transition:all 0.2s;}
.practice-check.checked{background:var(--accent-glow);border-color:var(--accent);color:var(--accent);}
.practice-check.future{opacity:0.3;cursor:default;}
.lesson-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;border-left:3px solid var(--accent);}
.lesson-date{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
.lesson-title{font-family:'DM Serif Display',Georgia,serif;font-size:16px;margin:4px 0 8px;}
.lesson-concepts{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0;}
.concept-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.milestone{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.milestone:last-child{border-bottom:none;}
.milestone-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.milestone-line{width:2px;background:var(--border);margin:0 5px;flex-shrink:0;}
.timeline{position:relative;padding-left:24px;}
.timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border);}
.timeline-item{position:relative;padding-bottom:16px;}
.timeline-item::before{content:'';position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);background:var(--bg);}
.timeline-item.completed::before{background:var(--accent);}
.resource-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;text-decoration:none;color:var(--text);transition:border-color 0.2s;}
.resource-item:hover{border-color:var(--accent);}
.resource-icon{font-size:20px;flex-shrink:0;}
.resource-title{font-size:13px;font-weight:600;}
.resource-type{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;}
.assignment-block{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.assignment-label{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.assignment-text{font-size:14px;line-height:1.5;}
.streak-display{text-align:center;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;}
.streak-number{font-family:'DM Serif Display',Georgia,serif;font-size:48px;color:var(--accent);}
.streak-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
@media(min-width:700px){
  .stats{grid-template-columns:repeat(4,1fr);}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.expandable{cursor:pointer;user-select:none;}
.expandable .expand-header{display:flex;align-items:center;justify-content:space-between;}
.expandable .expand-chevron{font-size:10px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;margin-left:8px;}
.expandable.open .expand-chevron{transform:rotate(180deg);}
.expand-body{overflow:hidden;max-height:0;transition:max-height 0.25s ease;}
.expandable.open .expand-body{max-height:600px;}
</style>

<body>
<!-- Landing: access code entry -->
<div id="screen-landing" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;">
<div style="text-align:center;padding:40px;max-width:380px;width:100%;">
<div style="font-size:48px;margin-bottom:12px;">🎸</div>
<div style="font-family:'DM Serif Display',Georgia,serif;font-size:26px;color:#D4943A;margin-bottom:4px;">Professor of Funk</div>
<div style="color:#888899;font-size:12px;margin-bottom:24px;">Student Portal</div>
<input id="auth-pw" type="text" placeholder="Enter your access code" autocomplete="off" autocapitalize="none" style="width:100%;max-width:280px;padding:10px 16px;border-radius:10px;border:1px solid #2a2a35;background:#13131a;color:#e8e8ef;font-size:14px;text-align:center;outline:none;display:block;margin:0 auto 8px;" onkeydown="if(event.key==='Enter')checkAuth()">
<button onclick="checkAuth()" style="padding:8px 32px;border-radius:10px;border:none;background:#D4943A;color:#000;font-weight:600;font-size:14px;cursor:pointer;width:100%;max-width:280px;">Continue</button>
<div id="auth-err" style="color:#f87171;font-size:12px;margin-top:10px;display:none;">Invalid access code</div>
<div style="display:flex;align-items:center;gap:12px;margin:16px auto;max-width:280px;"><span style="flex:1;height:1px;background:#2a2a35;"></span><span style="color:#888899;font-size:11px;">or</span><span style="flex:1;height:1px;background:#2a2a35;"></span></div>
<button onclick="showPortalScreen('screen-signin')" style="padding:8px 32px;border-radius:10px;border:1px solid #2a2a35;background:transparent;color:#e8e8ef;font-weight:500;font-size:13px;cursor:pointer;width:100%;max-width:280px;">Already have an account? Sign In</button>
</div>
</div>

<!-- Upgrade: set permanent login after code verification -->
<div id="screen-upgrade" style="display:none;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;">
<div style="text-align:center;padding:40px;max-width:380px;width:100%;">
<div style="font-size:36px;margin-bottom:12px;">🔒</div>
<div style="font-family:'DM Serif Display',Georgia,serif;font-size:26px;color:#D4943A;margin-bottom:4px;">Set Up Your Login</div>
<div style="color:#888899;font-size:12px;margin-bottom:24px;">Create a permanent login so you don't need the access code next time.</div>
<input id="upgrade-email" type="email" placeholder="Your email address" autocomplete="email" style="width:100%;max-width:280px;padding:10px 16px;border-radius:10px;border:1px solid #2a2a35;background:#13131a;color:#e8e8ef;font-size:14px;text-align:center;outline:none;display:block;margin:0 auto 8px;">
<input id="upgrade-pw" type="password" placeholder="Choose a password (6+ chars)" autocomplete="new-password" style="width:100%;max-width:280px;padding:10px 16px;border-radius:10px;border:1px solid #2a2a35;background:#13131a;color:#e8e8ef;font-size:14px;text-align:center;outline:none;display:block;margin:0 auto 8px;">
<button onclick="portalUpgradeEmail()" style="padding:8px 32px;border-radius:10px;border:none;background:#D4943A;color:#000;font-weight:600;font-size:14px;cursor:pointer;width:100%;max-width:280px;">Create Account</button>
<div id="upgrade-err" style="color:#f87171;font-size:12px;margin-top:10px;display:none;"></div>
<div id="upgrade-success" style="color:#4ade80;font-size:12px;margin-top:8px;display:none;">Account created! Loading portal...</div>
<div style="display:flex;align-items:center;gap:12px;margin:16px auto;max-width:280px;"><span style="flex:1;height:1px;background:#2a2a35;"></span><span style="color:#888899;font-size:11px;">or</span><span style="flex:1;height:1px;background:#2a2a35;"></span></div>
<button onclick="portalUpgradeGoogle()" style="padding:8px 32px;border-radius:10px;border:1px solid #2a2a35;background:#13131a;color:#e8e8ef;font-weight:500;font-size:13px;cursor:pointer;width:100%;max-width:280px;display:flex;align-items:center;justify-content:center;gap:8px;margin:0 auto;">
  <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
  Continue with Google
</button>
<div onclick="portalSkipUpgrade()" style="color:#D4943A;font-size:12px;cursor:pointer;margin-top:16px;display:inline-block;">Skip for now</div>
</div>
</div>

<!-- Sign in: returning users -->
<div id="screen-signin" style="display:none;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;">
<div style="text-align:center;padding:40px;max-width:380px;width:100%;">
<div style="font-size:48px;margin-bottom:12px;">🎸</div>
<div style="font-family:'DM Serif Display',Georgia,serif;font-size:26px;color:#D4943A;margin-bottom:4px;">Welcome Back</div>
<div style="color:#888899;font-size:12px;margin-bottom:24px;">Sign in to your student portal</div>
<input id="signin-email" type="email" placeholder="Email address" autocomplete="email" style="width:100%;max-width:280px;padding:10px 16px;border-radius:10px;border:1px solid #2a2a35;background:#13131a;color:#e8e8ef;font-size:14px;text-align:center;outline:none;display:block;margin:0 auto 8px;">
<input id="signin-pw" type="password" placeholder="Password" autocomplete="current-password" style="width:100%;max-width:280px;padding:10px 16px;border-radius:10px;border:1px solid #2a2a35;background:#13131a;color:#e8e8ef;font-size:14px;text-align:center;outline:none;display:block;margin:0 auto 8px;" onkeydown="if(event.key==='Enter')portalSignin()">
<button onclick="portalSignin()" style="padding:8px 32px;border-radius:10px;border:none;background:#D4943A;color:#000;font-weight:600;font-size:14px;cursor:pointer;width:100%;max-width:280px;">Sign In</button>
<div id="signin-err" style="color:#f87171;font-size:12px;margin-top:10px;display:none;"></div>
<div style="display:flex;align-items:center;gap:12px;margin:16px auto;max-width:280px;"><span style="flex:1;height:1px;background:#2a2a35;"></span><span style="color:#888899;font-size:11px;">or</span><span style="flex:1;height:1px;background:#2a2a35;"></span></div>
<button onclick="portalSigninGoogle()" style="padding:8px 32px;border-radius:10px;border:1px solid #2a2a35;background:#13131a;color:#e8e8ef;font-weight:500;font-size:13px;cursor:pointer;width:100%;max-width:280px;display:flex;align-items:center;justify-content:center;gap:8px;margin:0 auto;">
  <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
  Sign in with Google
</button>
<div onclick="showPortalScreen('screen-landing')" style="color:#D4943A;font-size:12px;cursor:pointer;margin-top:16px;display:inline-block;">Use an access code instead</div>
</div>
</div>

<!-- Loading spinner -->
<div id="screen-loading" style="display:none;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;">
<div style="text-align:center;padding:40px;">
<div style="font-size:36px;margin-bottom:12px;animation:pulse 1.5s infinite;">🎸</div>
<div style="color:#888899;font-size:12px;">Loading your portal...</div>
</div>
</div>
<style>@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}</style>

<script>
/* ===== FIREBASE SETUP ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBAVSC2g5xfnUXqkBoBX8TspITgDg_4FMo",
  authDomain: "professor-of-funk.firebaseapp.com",
  databaseURL: "https://professor-of-funk-default-rtdb.firebaseio.com",
  projectId: "professor-of-funk",
  storageBucket: "professor-of-funk.firebasestorage.app",
  messagingSenderId: "409198973109",
  appId: "1:409198973109:web:1c2aa4fd4611130b236efc"
};
const fbApp = firebase.initializeApp(firebaseConfig);
const fbDb = firebase.database();
const DB_ROOT = "professorOfFunk";
function dbRef(path) { return fbDb.ref(DB_ROOT + "/" + path); }
let skipSync = false;

async function fbLoad(key, fallback) {
  try {
    const snap = await dbRef(key).once("value");
    const val = snap.val();
    return val !== null ? val : fallback;
  } catch(e) {
    console.warn("Firebase read failed for " + key, e);
    return fallback;
  }
}

async function fbSave(key, val) {
  try { await dbRef(key).set(val); } catch(e) { console.warn("Firebase write failed for " + key, e); }
}

function onDataChange(key, callback) {
  const ref = dbRef(key);
  ref.on("value", snap => { const val = snap.val(); if (val !== null && !skipSync) callback(val); });
  return () => ref.off("value");
}

/* ===== AUTH ===== */
const AUTH_KEY = 'pof-portal-student';
let currentStudent = null;
let currentTab = 0;
const googleProvider = new firebase.auth.GoogleAuthProvider();
const portalScreens = ['screen-landing', 'screen-upgrade', 'screen-signin', 'screen-loading'];

function showPortalScreen(id) {
  portalScreens.forEach(s => document.getElementById(s).style.display = s === id ? 'flex' : 'none');
  document.getElementById('app').style.display = 'none';
}

function showPortalErr(elId, msg) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.style.display = 'block';
}

async function checkAuth() {
  const code = document.getElementById('auth-pw').value.trim().toLowerCase();
  if (!code) return;
  const errEl = document.getElementById('auth-err');
  errEl.style.display = 'none';
  try {
    // 1. Look up access code → student key (public read)
    const snap = await fbDb.ref(DB_ROOT + "/meta/accessCodes/" + code).once("value");
    const studentKey = snap.val();
    if (!studentKey) { errEl.style.display = 'block'; errEl.textContent = 'Invalid access code'; return; }
    // 2. Get the student's profile accessCode (the one that matches the Auth password)
    const profileSnap = await fbDb.ref(DB_ROOT + "/students/" + studentKey + "/profile/accessCode").once("value");
    const authCode = profileSnap.val() || code;
    // 3. Sign in with Firebase Auth (email/password created by admin)
    await firebase.auth().signInWithEmailAndPassword(
      studentKey + '@professoroffunk.app',
      authCode + '!PoF'
    );
    currentStudent = studentKey;
    sessionStorage.setItem(AUTH_KEY, studentKey);

    // 4. Check if already upgraded
    const uid = firebase.auth().currentUser.uid;
    const profileCheck = await dbRef('userProfiles/' + uid).once('value');
    if (profileCheck.val()) {
      // Already upgraded — go to dashboard
      showApp();
    } else {

async function resolveStudentFromProfile() {

    const snap = await dbRef('userProfiles/' + uid).once('value');

/* ===== LEADERBOARD ===== */
let leaderboardCache = null;
let leaderboardFetchedAt = 0;

async function fetchLeaderboard() {
  const now = Date.now();
  if (leaderboardCache && now - leaderboardFetchedAt < 60000) return leaderboardCache;
  try {
    const snap = await fbDb.ref(DB_ROOT + "/students").once("value");
    const allStudents = snap.val() || {};
    const dayNames = getDayNames();
    const nowDate = new Date();
    const year = nowDate.getFullYear();
    const month = nowDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    leaderboardCache = Object.entries(allStudents)
      .filter(([, s]) => s && s.profile && s.profile.name && s.profile.active !== false)
      .map(([key, s]) => {
        const practice = s.practice || {};
        // Monthly days
        let monthDays = 0;
        for (let d = 1; d <= Math.min(nowDate.getDate(), daysInMonth); d++) {
          const dt = new Date(year, month, d);
          const wk = getWeekId(dt);
          const dayIdx = (dt.getDay() + 6) % 7;
          const wkData = practice[wk];
          if (wkData && wkData[dayNames[dayIdx]]) monthDays++;
        }
        // Streak (reuse calcStreak logic with this student's practice data)
        let streak = 0;
        const today = new Date();
        for (let i = 0; i < 60; i++) {
          const d = new Date(today);
          d.setDate(today.getDate() - i);
          const wk = getWeekId(d);
          const dayIdx = (d.getDay() + 6) % 7;
          const dayName = dayNames[dayIdx];
          const wkData = practice[wk];
          if (wkData && wkData[dayName]) { streak++; }
          else if (i > 0) { break; }
        }
        const elapsed = nowDate.getDate();
        const pct = elapsed > 0 ? Math.round(monthDays / elapsed * 100) : 0;
        // First name only
        const firstName = (s.profile.name || '').split(' ')[0];
        return { key, firstName, monthDays, streak, pct };
      })
      .sort((a, b) => b.monthDays - a.monthDays || b.streak - a.streak);

    leaderboardFetchedAt = now;
    return leaderboardCache;
  } catch(e) {
    console.warn('Leaderboard fetch failed', e);
    return [];
  }
}

/* ===== PRACTICE DATA (Firebase) ===== */
let practiceData = {};

function getWeekId(date) {
  const d = new Date(date);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const days = Math.floor((d - jan1) / 86400000);
  const week = Math.ceil((days + jan1.getDay() + 1) / 7);
  return d.getFullYear() + '-W' + String(week).padStart(2, '0');
}

function loadPracticeData() {
  if (!currentStudent) return;
  practiceData = (studentData && studentData.practice) ? JSON.parse(JSON.stringify(studentData.practice)) : {};
}

  fbSave("students/" + currentStudent + "/practice", practiceData);
  setTimeout(() => { skipSync = false; }, 500);

/* ===== HELPERS ===== */
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'class' || k === 'className') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat(9).forEach(c => { if (c == null || c === false) return; el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return el;
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}


function getDayNames() { return ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun']; }
function getDayLabels() { return ['M', 'T', 'W', 'T', 'F', 'S', 'S']; }

function getCurrentWeekDates() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((day + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function calcStreak() {
  const days = getDayNames();
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 60; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const wk = getWeekId(d);
    const dayIdx = (d.getDay() + 6) % 7; // Mon=0
    const dayName = days[dayIdx];
    const weekData = practiceData[wk];
    if (weekData && weekData[dayName]) {
      streak++;
    } else if (i > 0) {
      break;
    }
  }
  return streak;
}

function calcMonthlyDays() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const dayNames = getDayNames();
  let count = 0;
  for (let d = 1; d <= Math.min(now.getDate(), daysInMonth); d++) {
    const dt = new Date(year, month, d);
    const wk = getWeekId(dt);
    const dayIdx = (dt.getDay() + 6) % 7;
    const weekData = practiceData[wk];
    if (weekData && weekData[dayNames[dayIdx]]) count++;
  }
  return { practiced: count, total: daysInMonth, elapsed: now.getDate() };
}

  const lessons = Object.entries(s.lessons || {})
    .map(([id, l]) => ({ id, ...l }))
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  return h('div', { class: 'pad' },
    h('h2', { class: 'section-title' }, 'Lesson History'),
    h('p', { class: 'section-sub' }, lessons.length + ' lessons on record'),
    ...lessons.map(l => {
      const isOpen = expandedLessons.has(l.id);
      const card = h('div', { class: 'lesson-card expandable' + (isOpen ? ' open' : '') },
        h('div', { class: 'expand-header' },
          h('div', { style: { flex: '1', minWidth: '0' } },
            h('div', { class: 'lesson-date' }, fmtDate(l.date)),
            h('div', { class: 'lesson-title', style: { marginBottom: '0' } }, l.title)
          ),
          h('span', { class: 'expand-chevron' }, '▼')
        ),
        h('div', { class: 'expand-body' },
          h('div', { style: { paddingTop: '10px' } },
            h('p', { style: { fontSize: '13px', color: 'var(--muted)', lineHeight: '1.5', marginBottom: '8px' } }, l.summary),
            l.keyConcepts && l.keyConcepts.length ? h('div', {},
              h('div', { class: 'label', style: { marginTop: '8px' } }, 'Key Concepts'),
              h('div', { class: 'lesson-concepts' },
                ...l.keyConcepts.map(c => h('span', { class: 'concept-tag' }, c))
              )
            ) : '',
            l.areasOfFocus && l.areasOfFocus.length ? h('div', {},
              h('div', { class: 'label', style: { marginTop: '8px' } }, 'Areas of Focus'),
              h('div', { style: { fontSize: '12px', color: 'var(--text)' } },
                ...l.areasOfFocus.map((a, i) => h('span', {}, (i > 0 ? ' · ' : '') + a))
              )
            ) : ''
          )
        )
      );
      card.addEventListener('click', () => {
        if (expandedLessons.has(l.id)) expandedLessons.delete(l.id);
        else expandedLessons.add(l.id);
        render();
      });
      return card;
    })
  );
}

function renderProgress() {
  const s = getStudentData();
  const milestones = Object.entries(s.milestones || {})
    .map(([id, m]) => ({ id, ...m }))
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  const songScores = s.songScores
    ? Object.entries(s.songScores).sort((a, b) => (b[1].lastUpdated || '').localeCompare(a[1].lastUpdated || ''))
    : [];

  const categoryColors = {
    technique: { bg: 'rgba(212,148,58,0.15)', color: 'var(--accent)' },
    theory: { bg: 'rgba(96,165,250,0.15)', color: 'var(--blue)' },
    repertoire: { bg: 'rgba(74,222,128,0.15)', color: 'var(--green)' },
    performance: { bg: 'rgba(192,132,252,0.15)', color: 'var(--purple)' },
    'ear training': { bg: 'rgba(251,191,36,0.15)', color: 'var(--yellow)' }
  };

  return h('div', { class: 'pad' },
    h('h2', { class: 'section-title' }, 'Progress'),

    // Repertoire Progress
    h('div', { class: 'label', style: { marginBottom: '8px', marginTop: '4px' } }, 'Repertoire Progress'),
    songScores.length > 0
      ? h('div', { class: 'card', style: { padding: '0', overflow: 'hidden' } },
          ...songScores.map(([, song], idx) =>
            h('div', {
              style: {
                display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 14px',
                borderBottom: idx < songScores.length - 1 ? '1px solid var(--border)' : 'none'
              }
            },
              h('div', { style: { flex: '1', minWidth: '0' } },
                h('div', { style: { fontWeight: '600', fontSize: '13px' } }, song.title),
                h('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, (song.artist || '') + (song.lastUpdated ? ' · updated ' + fmtDate(song.lastUpdated) : ''))
              ),
              h('div', { style: { textAlign: 'right', flexShrink: '0' } },
                h('div', { style: { display: 'flex', gap: '2px', justifyContent: 'flex-end' } },
                  ...[1,2,3,4,5].map(n =>
                    h('span', { style: { fontSize: '16px', color: n <= (song.score || 0) ? 'var(--accent)' : 'var(--border)', lineHeight: '1' } },
                      n <= (song.score || 0) ? '★' : '☆'
                    )
                  )
                ),
                h('div', { style: { fontSize: '10px', color: 'var(--accent)', fontWeight: '600', marginTop: '2px' } },
                  SCORE_LABELS_PORTAL[song.score] || ''
                )
              )
            )
          )
        )
      : h('p', { style: { color: 'var(--muted)', fontSize: '12px', marginBottom: '16px' } }, 'No songs scored yet — your teacher will rate your repertoire after lessons.'),

    // Milestones
    milestones.length > 0
      ? h('div', { style: { marginTop: '20px' } },
          h('div', { class: 'label', style: { marginBottom: '8px' } }, 'Milestones'),
          h('div', { class: 'timeline' },
            ...milestones.map(m => {
              const cc = categoryColors[m.category] || categoryColors.technique;
              return h('div', { class: 'timeline-item completed' },
                h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '4px' } },
                  h('div', { style: { fontWeight: '600', fontSize: '14px' } }, m.title),
                  h('span', { style: { fontSize: '10px', color: 'var(--muted)', flexShrink: '0', marginLeft: '8px' } }, fmtDate(m.date))
                ),
                h('span', { class: 'badge', style: { background: cc.bg, color: cc.color, marginBottom: '4px' } }, m.category),
                h('p', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.4' } }, m.description)
              );
            })
          )
        )
      : ''
  );
}

function renderResources() {
  const s = getStudentData();
  const resources = s.resources || [];
  const typeIcons = { PDF: '📄', Video: '🎬', Audio: '🎵', Link: '🔗' };

  return h('div', { class: 'pad' },
    h('h2', { class: 'section-title' }, 'My Resources'),
    h('p', { class: 'section-sub' }, 'Materials from your lessons'),
    ...resources.map(r =>
      h('a', { class: 'resource-item', href: r.url },
        h('span', { class: 'resource-icon' }, typeIcons[r.type] || '📁'),
        h('div', { style: { flex: '1', minWidth: '0' } },
          h('div', { class: 'resource-title' }, r.title),
          h('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } },
            h('span', { class: 'resource-type' }, r.type),
            h('span', { style: { fontSize: '10px', color: 'var(--muted)' } }, fmtDate(r.lessonDate))
          )
        ),
        h('span', { style: { color: 'var(--muted)', fontSize: '16px' } }, '→')
      )
    ),
    resources.length === 0 ? h('p', { style: { color: 'var(--muted)', textAlign: 'center', padding: '30px' } }, 'No resources yet.') : ''
  );
}

function renderEnsemble() {
  const s = getStudentData();
  const studentName = s.profile.name;
  const statusColors = {
    'performance-ready': { badge: 'badge-green', label: 'Performance Ready' },
    'learning': { badge: 'badge-blue', label: 'Learning' },
    'retired': { badge: 'badge-purple', label: 'Retired' }
  };

  // Filter ensembles where this student's name appears in info.members
  const myEnsembles = Object.entries(allEnsemblesData || {}).filter(([, ens]) => {
    const members = (ens.info && ens.info.members) || [];
    return members.includes(studentName);
  });

  if (myEnsembles.length === 0) {
    return h('div', { class: 'pad' },
      h('h2', { class: 'section-title' }, 'Ensemble'),
      h('p', { class: 'section-sub' }, 'Your group programs'),
      h('div', { class: 'card', style: { textAlign: 'center', padding: '30px 16px' } },
        h('div', { style: { fontSize: '32px', marginBottom: '10px' } }, '🎸'),
        h('p', { style: { color: 'var(--muted)', fontSize: '13px', lineHeight: '1.5' } }, "You're not currently in any ensemble program. Ask your teacher if you'd like to join one!")
      )
    );
  }

  return h('div', { class: 'pad' },
    h('h2', { class: 'section-title' }, 'Ensemble'),
    h('p', { class: 'section-sub' }, myEnsembles.length === 1 ? '1 group program' : myEnsembles.length + ' group programs'),

    ...myEnsembles.map(([key, ens]) => {
      const info = ens.info || {};
      const rep = Array.isArray(ens.repertoire) ? ens.repertoire : [];
      const ready = rep.filter(r => r.status === 'performance-ready').length;
      const learning = rep.filter(r => r.status === 'learning').length;

      return h('div', { class: 'card card-accent', style: { marginBottom: '12px' } },
        // Ensemble header
        h('div', { style: { marginBottom: '12px' } },
          h('div', { style: { fontFamily: "'DM Serif Display',Georgia,serif", fontSize: '18px', marginBottom: '4px' } }, info.name || key),
          info.schedule ? h('div', { style: { fontSize: '12px', color: 'var(--muted)' } }, info.schedule + (info.location ? ' · ' + info.location : '')) : ''
        ),

        // Member list
        info.members && info.members.length > 0 ? h('div', { style: { marginBottom: '12px' } },
          h('div', { class: 'label', style: { marginBottom: '6px' } }, 'Members'),
          h('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap' } },
            ...info.members.map(m =>
              h('span', {
                style: {
                  padding: '2px 10px', borderRadius: '10px', fontSize: '11px',
                  background: m === studentName ? 'var(--accent-glow)' : 'var(--surface2)',
                  border: m === studentName ? '1px solid var(--accent)' : '1px solid var(--border)',
                  color: m === studentName ? 'var(--accent)' : 'var(--text)',
                  fontWeight: m === studentName ? '600' : '400'
                }
              }, m + (m === studentName ? ' (you)' : ''))
            )
          )
        ) : '',

        // Repertoire
        rep.length > 0 ? h('div', {},
          h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' } },
            h('div', { class: 'label' }, 'Repertoire'),
            h('div', { style: { display: 'flex', gap: '8px', fontSize: '11px' } },
              ready > 0 ? h('span', { style: { color: 'var(--green)' } }, ready + ' ready') : '',
              learning > 0 ? h('span', { style: { color: 'var(--blue)' } }, learning + ' learning') : ''
            )
          ),
          ...rep.filter(r => r.status !== 'retired').map((song, idx) => {
            const sc = statusColors[song.status] || { badge: 'badge-accent', label: song.status };
            return h('div', {
              style: {
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '8px 0',
                borderBottom: idx < rep.filter(r => r.status !== 'retired').length - 1 ? '1px solid var(--border)' : 'none'
              }
            },
              h('div', { style: { minWidth: '0', flex: '1' } },
                h('div', { style: { fontSize: '13px', fontWeight: '600' } }, song.title),
                song.artist ? h('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, song.artist + (song.notes ? ' — ' + song.notes : '')) : ''
              ),
              h('span', { class: 'badge ' + sc.badge }, sc.label)
            );
          })
        ) : h('p', { style: { color: 'var(--muted)', fontSize: '12px', marginTop: '4px' } }, 'No repertoire yet.')
      );
    })
  );
}

/* ===== RENDER ===== */
function render() {
  if (!currentStudent) return;
  const app = document.getElementById('app');
  const prevContent = app.querySelector('.content');
  const savedScroll = prevContent ? prevContent.scrollTop : 0;
  app.innerHTML = '';
  const s = getStudentData();
  const tabs = [
    { icon: '📋', label: 'Assignments' },
    { icon: '🎯', label: 'Practice' },
    { icon: '📖', label: 'Lessons' },
    { icon: '📈', label: 'Progress' },
    { icon: '📁', label: 'Resources' },
    { icon: '🎵', label: 'Ensemble' }
  ];

  // Header
  app.appendChild(h('div', { class: 'header' },
    h('div', { class: 'logo' },
      h('span', { class: 'logo-icon' }, '🎸'),
      h('span', { class: 'logo-name' }, 'PROF OF FUNK'),
      h('span', { class: 'logo-sub' }, 'STUDENT PORTAL')
    ),
    h('div', { class: 'header-user' },
      h('span', {}, s.profile.name),
      h('button', { class: 'header-logout', onClick: logout }, 'Sign Out')
    )
  ));

  // Content
  const content = h('div', { class: 'content' });
  switch (currentTab) {
    case 0: content.appendChild(renderAssignments()); break;
    case 1: content.appendChild(renderPractice()); break;
    case 2: content.appendChild(renderLessons()); break;
    case 3: content.appendChild(renderProgress()); break;
    case 4: content.appendChild(renderResources()); break;
    case 5: content.appendChild(renderEnsemble()); break;
  }
  app.appendChild(content);
  content.scrollTop = savedScroll;

  // Bottom nav
  app.appendChild(h('div', { class: 'bottom-nav' },
    ...tabs.map((t, i) => h('button', {
      class: 'nav-btn' + (currentTab === i ? ' active' : ''),
      onClick: () => { currentTab = i; render(); if (i === 1) loadLeaderboard(); }
    },
      h('span', { class: 'nav-icon' }, t.icon),
      t.label
    ))
  ));
}

/* ===== SERVICE WORKER ===== */
if ('serviceWorker' in navigator) {
  const sw = `self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",e=>e.respondWith(fetch(e.request).catch(()=>new Response("Offline",{status:503}))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))).catch(() => {});
}
</script>
